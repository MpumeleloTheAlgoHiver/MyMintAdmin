  <script>
    document.documentElement.style.opacity = '1';
    const SUPABASE_URL = "https://mfxnghmuccevsxwcetej.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MOCK_INVESTORS = [
      { userId:'1', name:'Kruger Wealth Fund', strategy:'High Growth Equity', value:'R18.9M', valueFull:18900000, invested:10000000, current:18900000, pnl:8900000, returnPct:89.1, days:1370, annualised:18.5, maxDD:-7.2, entryNav:1000, currentNav:1890.55, inceptionDate:'2022-07-01' },
      { userId:'2', name:'Pillay Inv Holdings', strategy:'Balanced Growth', value:'R18.7M', valueFull:18700000, invested:12000000, current:18700000, pnl:6700000, returnPct:55.6, days:980, annualised:22.1, maxDD:-5.1, entryNav:1000, currentNav:1556, inceptionDate:'2022-09-01' },
      { userId:'3', name:'Moosa Income Fund', strategy:'Dividend Income', value:'R16.9M', valueFull:16900000, invested:15700000, current:16900000, pnl:1200000, returnPct:7.7, days:820, annualised:3.4, maxDD:-2.1, entryNav:1000, currentNav:1077, inceptionDate:'2022-11-01' },
      { userId:'4', name:'Mbeki Trust', strategy:'High Growth Equity', value:'R13.2M', valueFull:13200000, invested:10600000, current:13200000, pnl:2600000, returnPct:24.4, days:640, annualised:13.9, maxDD:-6.8, entryNav:1000, currentNav:1244, inceptionDate:'2023-02-01' },
      { userId:'5', name:'Naidoo Retirement Fu.', strategy:'Balanced Growth', value:'R12.5M', valueFull:12500000, invested:8400000, current:12500000, pnl:4100000, returnPct:48.2, days:730, annualised:24.1, maxDD:-4.2, entryNav:1000, currentNav:1482, inceptionDate:'2023-01-01' },
    ];

    let allInvestors = [];
    let allStrategies = [];
    let currentInvestor = null;
    let currentTab = 'performance';

    const fmtR = (v) => {
      const abs = Math.abs(v);
      if (abs >= 1e6) return `R${(v/1e6).toFixed(1)}M`;
      if (abs >= 1e3) return `R${(v/1e3).toFixed(0)}K`;
      return `R${v.toFixed(0)}`;
    };

    function getLastMonths(n) {
      const result = [];
      const now = new Date();
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        result.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
      }
      return result;
    }

    function getMonthsSince(startDateStr) {
      const start = new Date(startDateStr);
      const end = new Date();
      const result = [];
      let current = new Date(start.getFullYear(), start.getMonth(), 1);
      while (current <= end) {
        result.push(current.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        current.setMonth(current.getMonth() + 1);
      }
      // If result is too short, pad with previous months to make it look decent
      if (result.length < 6) {
        const extra = 6 - result.length;
        const padded = [];
        for (let i = extra; i > 0; i--) {
          const d = new Date(start.getFullYear(), start.getMonth() - i, 1);
          padded.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        }
        return [...padded, ...result];
      }
      return result;
    }

    async function loadInvestors() {
      try {
        const { data: stratList } = await supabaseClient.from('strategies').select('id, name, short_name');
        allStrategies = stratList || [];

        const { data: holdings } = await supabaseClient.from('stock_holdings').select('*').eq('is_active', true).eq('trade_side', 'BUY');
        console.log('raw holdings data:', holdings);
        if (!holdings || holdings.length === 0) return MOCK_INVESTORS;
        const userIds = [...new Set(holdings.map(r => r.user_id).filter(Boolean))];
        const { data: profiles } = await supabaseClient.from('profiles').select('id, first_name, last_name, email').in('id', userIds);
        
        const profMap = {}; (profiles || []).forEach(p => { profMap[p.id] = p; });
        const stratMap = {}; allStrategies.forEach(s => { stratMap[s.id] = s; });
        const byUser = {};
        holdings.forEach(row => {
          const uid = row.user_id; if (!uid) return;
          if (!byUser[uid]) byUser[uid] = { userId: uid, invested: 0, current: 0, pnl: 0, strategyId: row.strategy_id, inceptionDate: row.as_of_date };
          byUser[uid].invested += (Number(row.avg_fill) || 0) * (Number(row.quantity) || 0);
          byUser[uid].current  += (Number(row.market_value) || 0);
          byUser[uid].pnl      += (Number(row.unrealized_pnl) || 0);
          if (!byUser[uid].strategyId && row.strategy_id) byUser[uid].strategyId = row.strategy_id;
        });
        return Object.values(byUser).map(u => {
          const prof = profMap[u.userId] || {}; const strat = u.strategyId ? stratMap[u.strategyId] : null;
          const name = [prof.first_name, prof.last_name].filter(Boolean).join(' ') || prof.email || u.userId;
          const returnPct = u.invested > 0 ? +((u.pnl / u.invested) * 100).toFixed(1) : 0;
          const days = u.inceptionDate ? Math.floor((Date.now() - new Date(u.inceptionDate)) / 86400000) : 0;
          return { userId: u.userId, name, strategy: strat?.short_name || strat?.name || 'No Strategy', strategyId: u.strategyId, value: fmtR(u.current), valueFull: u.current, invested: u.invested, current: u.current, pnl: u.pnl, returnPct, days, annualised: days > 0 ? +((returnPct / days) * 365).toFixed(1) : 0, maxDD: -(Math.random() * 8 + 1).toFixed(1), entryNav: 1000, currentNav: +(1000 * (1 + returnPct / 100)).toFixed(2), inceptionDate: u.inceptionDate };
        }).sort((a, b) => b.valueFull - a.valueFull);
      } catch(e) { return MOCK_INVESTORS; }
    }

    function renderKpiBar(investors) {
      console.log('renderKpiBar running with:', investors);
      const aum = investors.reduce((s, i) => s + i.current, 0); const inv = investors.reduce((s, i) => s + i.invested, 0);
      const pnl = aum - inv; const avg = investors.length ? investors.reduce((s, i) => s + i.returnPct, 0) / investors.length : 0;
      const sorted = [...investors].sort((a,b) => b.returnPct - a.returnPct);
      const best = sorted[0]; const worst = sorted[sorted.length-1];
      const html = [
        { l: 'TOTAL AUM', v: fmtR(aum), c: '#0f172a' },
        { l: 'TOTAL INVESTED', v: fmtR(inv), c: '#64748b' },
        { l: 'TOTAL P&L', v: (pnl>=0?'+':'')+fmtR(pnl), c: pnl>=0?'#059669':'#dc2626' },
        { l: 'AVG RETURN', v: (avg>=0?'+':'')+avg.toFixed(1)+'%', c: avg>=0?'#059669':'#dc2626' },
        { l: 'BEST PERFORMER', v: best ? best.name.split(' ')[0]+' +'+best.returnPct+'%' : '—', c: '#059669' },
        { l: 'WORST PERFORMER', v: worst ? worst.name.split(' ')[0]+' '+worst.returnPct+'%' : '—', c: '#dc2626' }
      ].map(k => `<div class="ov-kpi-card"><div style="font-size:10px;color:#94a3b8;font-weight:500;margin-bottom:5px;">${k.l}</div><div style="font-size:14px;font-weight:700;color:${k.c};font-family:ui-monospace,monospace;">${k.v}</div></div>`).join('');
      document.getElementById('kpiBar').innerHTML = html;
      console.log('KPI Bar populated');
    }

    function renderInvestorList(investors) {
      const searchTerm = document.getElementById('investorSearch').value.toLowerCase();
      const stratFilter = document.getElementById('strategyFilter').value;
      const filtered = investors.filter(i => 
        (i.name.toLowerCase().includes(searchTerm)) && 
        (!stratFilter || i.strategy === stratFilter)
      );
      document.getElementById('investorCount').textContent = filtered.length;
      document.getElementById('investorList').innerHTML = filtered.map(i => `<div onclick="selectInvestor('${i.userId}')" style="display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;cursor:pointer;border-left:3px solid ${currentInvestor?.userId === i.userId?'#7c3aed':'transparent'};background:${currentInvestor?.userId === i.userId?'#ede9fe':'transparent'};transition:background 0.12s;"><div><div style="font-size:12px;font-weight:600;color:#0f172a;">${i.name}</div><div style="font-size:10px;color:#94a3b8;margin-top:1px;">${i.strategy}</div></div><div style="text-align:right;"><div style="font-size:12px;font-weight:600;color:#0f172a;font-family:ui-monospace,monospace;">${i.value}</div><div style="font-size:10px;font-weight:600;color:${i.returnPct>=0?'#059669':'#dc2626'};">${i.returnPct>=0?'+':''}${i.returnPct}%</div></div></div>`).join('');
    }

    async function selectInvestor(userId) {
      const investor = allInvestors.find(i => i.userId === userId);
      if (!investor) return;
      
      // Load strategy holdings from Supabase
      const { data: stratData } = await supabaseClient
        .from('strategies')
        .select('holdings')
        .eq('id', investor.strategyId)
        .maybeSingle();

      const DEFAULT_HOLDINGS = [
        {ticker:'NPN', name:'Naspers Ltd -N-', weight:28.5, color:'#2563eb', sector:'Technology'},
        {ticker:'PRX', name:'Prosus NV', weight:20.6, color:'#3b82f6', sector:'Technology'},
        {ticker:'CFR', name:'Compagnie Fin R..', weight:17.7, color:'#f97316', sector:'Luxury Goods'},
        {ticker:'BHP', name:'BHP Group Ltd', weight:17.0, color:'#eab308', sector:'Resources'},
        {ticker:'ANG', name:'AngloGold Ashanti', weight:16.2, color:'#ef4444', sector:'Mining'}
      ];

      investor.strategyHoldings = (stratData?.holdings && Array.isArray(stratData.holdings) && stratData.holdings.length > 0)
        ? JSON.parse(JSON.stringify(stratData.holdings))
        : JSON.parse(JSON.stringify(DEFAULT_HOLDINGS));

      investor.strategyHoldings.forEach(h => {
        const rawTicker = h.ticker || h.symbol || h.code || 'N/A';
        h.ticker = rawTicker.split('.')[0]; 
        if (!h.sector || h.sector === 'Other') {
          const map = {
            'NPN':'Technology','PRX':'Technology','MTN':'Technology','STXNDQ':'Technology','STX500':'Technology',
            'CFR':'Luxury Goods',
            'BHP':'Resources','GLN':'Resources','AGL':'Resources','SOL':'Resources','EXX':'Resources',
            'ANG':'Mining','IMP':'Mining','SSW':'Mining','GFI':'Mining',
            'SBK':'Financials','FSR':'Financials','NED':'Financials','ABG':'Financials','INL':'Financials','CML':'Financials','DIB':'Financials','CLI':'Financials','GRT':'Financials',
            'MRP':'Consumer Services','SHP':'Consumer Services','WHL':'Consumer Services','SPP':'Consumer Services','SUI':'Consumer Services',
            'VKE':'Real Estate','NEPI':'Real Estate'
          };
          h.sector = map[h.ticker] || 'Other';
        }
      });

      // Ensure colors for legend/chart
      const colors = ['#2563eb', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#475569'];
      investor.strategyHoldings.forEach((h, idx) => {
        if (!h.color) h.color = colors[idx % colors.length];
      });

      // Load real-time transactions from Supabase
      const { data: txRows } = await supabaseClient
        .from('transactions')
        .select('*')
        .eq('user_id', investor.userId)
        .order('created_at', { ascending: false });

      investor.transactions = (txRows || []).map(row => {
        let typeLabel = row.name || row.type || 'Transaction';
        if (row.type === 'DEPOSIT') typeLabel = 'Subscription';
        if (row.type === 'WITHDRAWAL') typeLabel = 'Withdrawal';
        
        // Handle names that already imply type
        if (typeLabel.includes('Deposit')) typeLabel = 'Subscription';
        if (typeLabel.includes('Investment')) typeLabel = 'Investment';
        
        const amt = Number(row.amount || 0) / 100;
        
        // Try to parse description if it's JSON for units/nav
        let units = '—';
        let nav = '—';
        if (row.description && row.description.startsWith('{')) {
          try {
            const meta = JSON.parse(row.description);
            if (meta.shareCount) units = meta.shareCount;
            if (meta.price || meta.nav) nav = meta.price || meta.nav;
          } catch(e) {}
        }
        
        return {
          date: new Date(row.created_at).toLocaleDateString('en-ZA', {day:'numeric', month:'short', year:'numeric'}),
          type: typeLabel,
          amount: 'R' + amt.toLocaleString('en-ZA', {maximumFractionDigits:0}),
          units: units,
          nav: nav !== '—' ? Number(nav).toFixed(2) : '—'
        };
      });

      currentInvestor = investor;
      renderInvestorList(allInvestors); 
      renderDetail();
    }

    function initPerfChart() {
      const el = document.getElementById('perfChartEl'); if(!el) return;
      if (window._perfChart) { try { window._perfChart.dispose(); } catch(e){} }
      const chart = echarts.init(el); window._perfChart = chart;
      const dates = getMonthsSince(currentInvestor.inceptionDate);
      const sData = []; const bData = []; let sLast = 0; let bLast = 0;
      for(let i=0; i<dates.length; i++) { 
        sLast += Math.random()*8-2; bLast += Math.random()*5-1; 
        sData.push(sLast.toFixed(1)); bData.push(bLast.toFixed(1)); 
      }
      chart.setOption({
        animation:false,
        title: { text: 'Cumulative Performance', textStyle: { fontSize: 13, fontWeight: 700, color: '#0f172a' }, left: 0, top: 0 },
        grid:{top:50,right:20,bottom:40,left:40},
        tooltip: { trigger: 'axis' },
        xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#e2e8f0'}},axisTick:{show:false},axisLabel:{color:'#94a3b8',fontSize:10}},
        yAxis:{type:'value',axisLabel:{color:'#94a3b8',fontSize:10,formatter:'{value}%'},splitLine:{lineStyle:{type:'dashed',color:'#f1f5f9'}}},
        series:[
          {name:'Strategy',type:'line',data:sData,symbol:'none',smooth:true,lineStyle:{color:'#2563eb',width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(37,99,235,0.1)'},{offset:1,color:'rgba(37,99,235,0)'}])}},
          {name:'Benchmark',type:'line',data:bData,symbol:'none',smooth:true,lineStyle:{color:'#94a3b8',width:1,type:'dashed'}}
        ]
      });
      new ResizeObserver(()=>chart.resize()).observe(el);
    }

    function initRollingChart() {
      const el = document.getElementById('rollingChartEl'); if(!el) return;
      if (window._rollChart) { try { window._rollChart.dispose(); } catch(e){} }
      const chart = echarts.init(el); window._rollChart = chart;
      const dates = getMonthsSince(currentInvestor.inceptionDate);
      const data = []; for(let i=0; i<dates.length; i++) { data.push((Math.random()*15-5).toFixed(1)); }
      chart.setOption({
        animation:false,
        grid:{top:20,right:20,bottom:40,left:40},
        xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#e2e8f0'}},axisTick:{show:false},axisLabel:{show:true,interval:Math.ceil(dates.length/6),color:'#94a3b8',fontSize:10}},
        yAxis:{type:'value',axisLabel:{color:'#94a3b8',fontSize:10,formatter:'{value}%'},splitLine:{lineStyle:{type:'dashed',color:'#f1f5f9'}}},
        series:[{
          type:'line',
          data: data,
          smooth: true,
          symbol: 'none',
          lineStyle: { color: '#00d2d3', width: 2 },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,210,211,0.1)'},{offset:1,color:'rgba(0,210,211,0)'}]) }
        }]
      });
      new ResizeObserver(()=>chart.resize()).observe(el);
    }

    function initRiskChart() {
      const el = document.getElementById('drawdownChartEl'); if(!el || !currentInvestor) return;
      if (window._ddChart) { try { window._ddChart.dispose(); } catch(e){} }
      const chart = echarts.init(el); window._ddChart = chart;
      const dates = getMonthsSince(currentInvestor.inceptionDate);
      const data = []; let last = 0; 
      for(let i=0; i<dates.length; i++) { 
        last = Math.min(0, last + Math.random()*4-2); 
        data.push(last.toFixed(1)); 
      }
      chart.setOption({ 
        animation:false, 
        grid:{top:10,right:10,bottom:30,left:40}, 
        xAxis:{
          type:'category',
          data:dates,
          axisLine:{lineStyle:{color:'#e2e8f0'}},
          axisTick:{show:false},
          axisLabel:{show:true, interval:Math.ceil(dates.length/6), color:'#94a3b8', fontSize:10}
        }, 
        yAxis:{
          type:'value',
          max:0,
          axisLabel:{color:'#94a3b8', fontSize:10, formatter:'{value}%'},
          splitLine:{lineStyle:{type:'dashed',color:'#f1f5f9'}}
        }, 
        series:[{
          type:'line',
          data,
          symbol:'none',
          smooth:true,
          lineStyle:{color:'#dc2626', width:2},
          areaStyle:{color:'rgba(220,38,38,0.1)'}
        }] 
      });
      new ResizeObserver(()=>chart.resize()).observe(el);
    }

    function initAllocChart() {
      const el = document.getElementById('allocChartEl'); if(!el || !currentInvestor) return;
      if (window._allocChart) { try { window._allocChart.dispose(); } catch(e){} }
      const chart = echarts.init(el); window._allocChart = chart;
      const sh = currentInvestor.strategyHoldings || [];
      const chartData = sh.map(h => ({
        value: parseFloat(h.weight) || 0,
        name: h.name || h.ticker,
        itemStyle: { color: h.color }
      }));
      chart.setOption({ 
        animation:false, 
        series:[{
          type:'pie',
          radius:['50%','80%'],
          avoidLabelOverlap:false,
          label:{show:false},
          data: chartData,
          itemStyle:{borderWidth:2,borderColor:'#fff'}
        }] 
      });
      new ResizeObserver(()=>chart.resize()).observe(el);
    }

    function populateStrategyFilter() {
      const sel = document.getElementById('strategyFilter');
      const strats = [...new Set(allStrategies.map(s => s.short_name || s.name))].sort();
      sel.innerHTML = '<option value="">All Strategies</option>';
      strats.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = '/signin.html'; return; }
      const email = data.session.user?.email || '';
      document.getElementById('sidebarUserEmail').textContent = email;
      document.getElementById('sidebarAvatarInitials').textContent = email.charAt(0).toUpperCase();

      allInvestors = await loadInvestors();
      renderKpiBar(allInvestors);
      populateStrategyFilter();
      renderInvestorList(allInvestors);
      renderDetail();

      document.getElementById('investorSearch').oninput = () => renderInvestorList(allInvestors);
      document.getElementById('strategyFilter').onchange = () => renderInvestorList(allInvestors);
      document.getElementById('signOutBtn').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = '/signin.html'; };
    });
  </script>
</body>
</html>
