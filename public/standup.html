<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Daily Tasks — Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f2f2f7;color:#1c1c1e;display:flex;min-height:100vh;}
    .main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .page{padding:32px 36px 48px;max-width:980px;}
    .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8e8e93;margin-bottom:8px;}
    .page-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px;}
    .page-title{font-size:32px;font-weight:800;color:#1c1c1e;letter-spacing:-.02em;line-height:1.1;}
    .page-subtitle{font-size:13px;color:#8e8e93;margin-bottom:24px;}
    .pill-nav{display:flex;gap:4px;background:#f2f2f7;padding:4px;border-radius:12px;flex-shrink:0;margin-top:4px;}
    .pill-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:9px;border:none;background:transparent;color:#8e8e93;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
    .pill-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
    .pill-btn.active{background:#7c3aed;color:#fff;box-shadow:0 1px 4px rgba(124,58,237,.3);}
    .pill-btn:not(.active):hover{color:#3c3c43;}
    .btn-new{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#7c3aed;color:#fff;font-family:inherit;transition:background .15s;}
    .btn-new:hover{background:#6d28d9;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    .quick-card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:16px;margin-bottom:20px;}
    .quick-label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
    .quick-row{display:flex;gap:8px;align-items:center;}
    .quick-select{background:#f2f2f7;border:none;border-radius:10px;padding:9px 10px;font-size:12px;font-weight:600;color:#3c3c43;cursor:pointer;outline:none;font-family:inherit;flex-shrink:0;}
    .quick-input{flex:1;border:1px solid #e5e5ea;border-radius:10px;padding:9px 14px;font-size:14px;outline:none;font-family:inherit;color:#1c1c1e;}
    .quick-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.08);}
    .quick-input::placeholder{color:#8e8e93;}
    .priority-select{border:1px solid #e5e5ea;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;color:#7c3aed;background:#fff;outline:none;cursor:pointer;font-family:inherit;flex-shrink:0;}
    .btn-add{background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;flex-shrink:0;transition:background .15s;}
    .btn-add:hover{background:#6d28d9;}
    .section-label{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;margin:20px 0 10px;display:flex;align-items:center;gap:6px;}
    .section-label::after{content:'';flex:1;height:1px;background:#e5e5ea;}
    .section-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#f2f2f7;color:#8e8e93;font-size:10px;font-weight:700;}
    .section-toggle{background:none;border:none;cursor:pointer;color:#8e8e93;padding:0 2px;display:flex;align-items:center;margin-left:4px;}
    .section-done .section-count{background:#e8f8ef;color:#28a745;}
    .done-btn{width:20px;height:20px;border-radius:50%;border:2px solid #d1d1d6;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .done-btn:hover{border-color:#28a745;background:#f0fdf4;}
    .done-btn.done{background:#28a745;border-color:#28a745;}
    .done-btn svg{width:10px;height:10px;fill:#fff;display:none;}
    .done-btn.done svg{display:block;}
    .task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;transition:border-color .15s;}
    .task-row:hover{border-color:#c4b5fd;}
    .task-row.done-row{background:#f0fdf4;border-color:#bbf7d0;}
    .task-row.done-row .task-title{text-decoration:line-through;color:#8e8e93;}
    .task-title{flex:1;font-size:13px;color:#1c1c1e;}
    .task-date{font-size:11px;color:#8e8e93;flex-shrink:0;white-space:nowrap;}
    .task-date.overdue{color:#ff3b30;font-weight:700;}
    .btn-xs{padding:3px 9px;font-size:11px;border-radius:7px;border:none;font-weight:600;cursor:pointer;font-family:inherit;}
    .btn-xs:hover{opacity:.8;}
    .btn-xs-red{background:#fff0ef;color:#ff3b30;}
    .btn-xs-ghost{background:#f2f2f7;color:#3c3c43;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
    .badge-medium{background:#e8e0fd;color:#5e35b1;}
    .badge-high{background:#fff3cd;color:#7a4d00;}
    .badge-urgent{background:#fde8e8;color:#c0392b;}
    .badge-low{background:#f2f2f7;color:#8e8e93;}
    .empty-card{background:#fff;border-radius:16px;border:1px solid #e5e5ea;padding:48px 24px;text-align:center;margin-bottom:28px;}
    .empty-icon{font-size:28px;margin-bottom:12px;}
    .empty-title{font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:6px;}
    .empty-sub{font-size:13px;color:#8e8e93;}
    .phase-bar{display:flex;gap:8px;margin-bottom:20px;}
    .next-row{display:flex;justify-content:flex-end;margin-top:16px;}
  </style>
</head>
<body>
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="page">

      <div class="page-eyebrow" id="eyebrow">THURSDAY, 17 JULY</div>
      <div class="page-title-row">
        <h1 class="page-title" id="greeting">Good morning 👋</h1>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:6px;">
          <button class="btn-new" onclick="focusQuickAdd()">+ New Task</button>
          <div class="pill-nav">
            <button class="pill-btn active" id="pillMyday" onclick="switchTab('myday',this)">
              <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
              My Day
            </button>
            <button class="pill-btn" id="pillStandup" onclick="switchTab('standup',this)">
              <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
              Standup
            </button>
            <button class="pill-btn" id="pillBoard" onclick="switchTab('board',this)">
              <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              Team Board
            </button>
          </div>
        </div>
      </div>
      <p class="page-subtitle" id="subtitle">Here's your day, own it.</p>

      <!-- MY DAY -->
      <div class="tab-pane active" id="tab-myday">
        <div class="quick-card">
          <div class="quick-label">What are you working on today?</div>
          <div class="quick-row">
            <select class="quick-select" id="quickAssignee"><option value="me">For me</option></select>
            <input class="quick-input" id="quickTitle" type="text" placeholder="Add to today's focus… press Enter"/>
            <select class="priority-select" id="quickPriority">
              <option value="medium">Medium</option>
              <option value="low">Low</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
            <button class="btn-add" onclick="quickAdd()">+ Add</button>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-week" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Done This Week</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-month" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Done This Month</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-rate" style="font-size:22px;font-weight:800;color:#7c3aed;">0%</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Completion Rate</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-overdue" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Overdue</div>
          </div>
        </div>

        <div class="section-label">🔥 Today's Focus <span class="section-count" id="focusCount">0</span></div>
        <div id="myFocus"></div>

        <div class="section-label section-done">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#28a745"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          Done Today <span class="section-count" id="doneCount">0</span>
          <button class="section-toggle" onclick="toggleDone(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          </button>
        </div>
        <div id="myDone" class="task-list"></div>
      </div>

      <!-- STANDUP -->
      <div class="tab-pane" id="tab-standup">
        <div class="phase-bar">
          <button class="btn-add" id="phaseBtn1" onclick="switchPhase(1)" style="border-radius:20px;">✓ Yesterday's Review</button>
          <button class="btn-xs btn-xs-ghost" id="phaseBtn2" onclick="switchPhase(2)" style="padding:8px 16px;font-size:13px;border-radius:20px;">◎ Today's Tasks</button>
        </div>
        <div id="phase1"></div>
        <div id="phase2" style="display:none"></div>
      </div>

      <!-- TEAM BOARD -->
      <div class="tab-pane" id="tab-board">
        <div id="team-board-content"></div>
      </div>

    </div>
  </div>

  <script src="/js/access-guard.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    function getToken() {
      try {
        const k = Object.keys(localStorage).find(k=>k.startsWith('sb-')&&k.endsWith('-auth-token'));
        return k ? JSON.parse(localStorage.getItem(k))?.access_token||null : null;
      } catch { return null; }
    }
    function getAuthUser() {
      try {
        const k = Object.keys(localStorage).find(k=>k.startsWith('sb-')&&k.endsWith('-auth-token'));
        return k ? JSON.parse(localStorage.getItem(k))?.user||null : null;
      } catch { return null; }
    }

    function localDate(offsetDays=0) {
      const sast = new Date(Date.now()+2*3600000);
      sast.setUTCDate(sast.getUTCDate()+offsetDays);
      return `${sast.getUTCFullYear()}-${String(sast.getUTCMonth()+1).padStart(2,'0')}-${String(sast.getUTCDate()).padStart(2,'0')}`;
    }
    const TODAY     = localDate(0);
    const YESTERDAY = localDate(-1);

    function fmtDate(d) {
      if (!d) return '';
      const [,m,day] = d.split('-');
      return `${parseInt(day)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]}`;
    }
    function isOverdue(t) { return t.due_date && t.due_date < TODAY && t.status !== 'done'; }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function badge(p) { return `<span class="badge badge-${p}">${p}</span>`; }
    function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
    const CHECK = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

    let allTasks=[], allMembers=[], myMember=null, doneOpen=true;

    async function api(path,opts={}) {
      const r = await fetch(path,{...opts,headers:{'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`,...(opts.headers||{})}});
      if (!r.ok) throw new Error(await r.text());
      const t = await r.text();
      return t ? JSON.parse(t) : null;
    }

    async function loadAll() {
      const [tasks,members] = await Promise.all([api('/api/tasks'),api('/api/tasks?action=members')]);
      allTasks   = Array.isArray(tasks) ? tasks : [];
      allMembers = (Array.isArray(members)?members:[]).filter(m=>m.status==='active'||!m.status);
    }

    async function init() {
      if (!getToken()) return;
      const user = getAuthUser();
      const sast = new Date(Date.now()+2*3600000);
      document.getElementById('eyebrow').textContent =
        sast.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'}).toUpperCase();
      await loadAll();
      myMember = allMembers.find(m=>m.email===user?.email)||null;
      const h = sast.getUTCHours();
      const greet = h<12?'Good morning':h<17?'Good afternoon':'Good evening';
      const fname = myMember?.full_name?.split(' ')[0]||'';
      document.getElementById('greeting').textContent = `${greet}${fname?', '+fname:''} 👋`;
      const sel = document.getElementById('quickAssignee');
      sel.innerHTML = `<option value="${myMember?.id||'me'}">For me</option>`;
      allMembers.filter(m=>m.id!==myMember?.id).forEach(m=>{
        sel.innerHTML += `<option value="${m.id}">${esc(m.full_name||m.email)}</option>`;
      });
      render();
    }

    function render() { renderMyDay(); renderStandup(); renderTeamBoard(); }

    /* ── MY DAY ── */
    function taskRow(t,opts={}) {
      const done=t.status==='done', ov=isOverdue(t);
      return `<div class="task-row${done?' done-row':''}" id="row-${t.id}">
        <button class="done-btn${done?' done':''}" onclick="toggleStatus('${t.id}','${t.status}')">${CHECK}</button>
        <span class="task-title">${esc(t.title)}</span>
        ${badge(t.priority)}
        ${t.due_date?`<span class="task-date${ov?' overdue':''}">${fmtDate(t.due_date)}${ov?' ⚠':''}</span>`:''}
        ${opts.del?`<button class="btn-xs btn-xs-red" onclick="deleteTask('${t.id}')">✕</button>`:''}
      </div>`;
    }

    function renderMyDay() {
      const myId=myMember?.id;
      const focus=allTasks.filter(t=>t.assigned_to===myId&&t.status!=='done'&&(t.due_date===TODAY||t.status==='in_progress'||(t.due_date&&t.due_date<TODAY)));
      const done=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at?.slice(0,10)===TODAY);
      document.getElementById('focusCount').textContent=focus.length;
      document.getElementById('doneCount').textContent=done.length;
      document.getElementById('myFocus').innerHTML = focus.length
        ? `<div class="task-list">${focus.map(t=>taskRow(t,{del:true})).join('')}</div>`
        : `<div class="empty-card"><div class="empty-icon">✅</div><div class="empty-title">Nothing due today</div><div class="empty-sub">Add something above or check your upcoming tasks.</div></div>`;
      document.getElementById('myDone').innerHTML = done.length ? done.map(t=>taskRow(t)).join('') : '';
      document.getElementById('myDone').style.display = doneOpen?'':'none';
      const weekStr=localDate(-7);
      const doneWeek  = allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at&&t.completed_at.slice(0,10)>=weekStr).length;
      const doneMonth = allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at&&t.completed_at.slice(0,7)===TODAY.slice(0,7)).length;
      const myAll=allTasks.filter(t=>t.assigned_to===myId).length;
      const myDoneAll=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done').length;
      const pct=myAll>0?Math.round(myDoneAll/myAll*100):0;
      const myOv=allTasks.filter(t=>t.assigned_to===myId&&isOverdue(t)).length;
      document.getElementById('stat-week').textContent=doneWeek;
      document.getElementById('stat-month').textContent=doneMonth;
      document.getElementById('stat-rate').textContent=pct+'%';
      document.getElementById('stat-overdue').textContent=myOv;
      document.getElementById('stat-overdue').style.color=myOv>0?'#ff3b30':'#1c1c1e';
    }

    function toggleDone(btn) {
      doneOpen=!doneOpen;
      document.getElementById('myDone').style.display=doneOpen?'':'none';
      btn.innerHTML=doneOpen
        ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>'
        :'<svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z"/></svg>';
    }

    async function quickAdd() {
      const inp=document.getElementById('quickTitle');
      const title=inp.value.trim();
      if (!title) return;
      const val=document.getElementById('quickAssignee').value;
      const assignId=(val&&val!=='me')?val:(myMember?.id||null);
      try {
        await api('/api/tasks',{method:'POST',body:JSON.stringify({title,priority:document.getElementById('quickPriority').value,due_date:TODAY,assigned_to:assignId})});
        inp.value='';
        await loadAll(); render();
      } catch(err) { alert('Failed to add task: '+err.message); }
    }

    function focusQuickAdd() {
      switchTab('myday',document.getElementById('pillMyday'));
      document.getElementById('quickTitle').focus();
    }

    document.addEventListener('keydown',e=>{
      if (e.key==='Enter'&&document.activeElement?.id==='quickTitle') quickAdd();
    });

    async function toggleStatus(id,cur) {
      await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:cur==='done'?'todo':'done'})});
      await loadAll(); render();
    }
    async function doToday(id) {
      await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({due_date:TODAY})});
      await loadAll(); render();
    }
    async function deleteTask(id) {
      await api(`/api/tasks/${id}`,{method:'DELETE'});
      await loadAll(); render();
    }

    /* ── STANDUP ── */
    function renderStandup() { renderPhase1(); renderPhase2(); }

    function switchPhase(n) {
      document.getElementById('phase1').style.display=n===1?'':'none';
      document.getElementById('phase2').style.display=n===2?'':'none';
      document.getElementById('phaseBtn1').className=n===1?'btn-add':'btn-xs btn-xs-ghost';
      document.getElementById('phaseBtn1').style.cssText='border-radius:20px;'+(n===1?'':'padding:8px 16px;font-size:13px;');
      document.getElementById('phaseBtn2').className=n===2?'btn-add':'btn-xs btn-xs-ghost';
      document.getElementById('phaseBtn2').style.cssText='border-radius:20px;'+(n===2?'':'padding:8px 16px;font-size:13px;');
    }

    function renderPhase1() {
      const unfinished=allTasks.filter(t=>t.due_date===YESTERDAY&&t.status!=='done');
      let html='';
      allMembers.forEach(m=>{
        const tasks=unfinished.filter(t=>t.assigned_to===m.id);
        const has=tasks.length>0;
        html+=`
          <div style="background:#fff;border:1px solid ${has?'#d4c8fc':'#e5e5ea'};border-radius:14px;overflow:hidden;margin-bottom:10px;${!has?'opacity:.6':''}">
            <div style="display:flex;">
              <div style="width:176px;flex-shrink:0;padding:16px;border-right:1px solid #f2f2f7;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                  <div style="width:32px;height:32px;border-radius:50%;background:${has?'#e8e0fd':'#e8f8ef'};color:${has?'#7c3aed':'#28a745'};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials(m.full_name)}</div>
                  <div style="min-width:0;">
                    <p style="font-size:13px;font-weight:700;color:#1c1c1e;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.full_name||m.email)}</p>
                    <p style="font-size:10px;color:#8e8e93;margin:2px 0 0;">${esc(m.role||'')}</p>
                  </div>
                </div>
                ${!has?`<div style="display:flex;align-items:center;gap:5px;color:#28a745;font-size:11px;font-weight:700;"><svg width="12" height="12" viewBox="0 0 24 24" fill="#28a745"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> All done</div>`:''}
              </div>
              <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;">
                ${!has
                  ?`<p style="font-size:12px;color:#8e8e93;">Nothing carried from yesterday</p>`
                  :tasks.map(t=>`
                    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff8f0;border:1px solid #fde8c8;border-radius:10px;">
                      <span style="flex:1;font-size:13px;font-weight:600;color:#1c1c1e;">${esc(t.title)}</span>
                      <div style="display:flex;gap:6px;flex-shrink:0;">
                        <button onclick="p1Done('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#e8f8ef;border:1px solid #bbf7d0;color:#28a745;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;"><svg width="11" height="11" viewBox="0 0 24 24" fill="#28a745"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Done</button>
                        <button onclick="p1Carry('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#e8e0fd;border:1px solid #c4b5fd;color:#7c3aed;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">→ Carry</button>
                        <button onclick="deleteTask('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#fff0ef;border:1px solid #fca5a5;color:#ff3b30;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">✕ Remove</button>
                      </div>
                    </div>`).join('')
                }
              </div>
            </div>
          </div>`;
      });
      if (!allMembers.length) html='<p style="color:#8e8e93;font-size:13px;">No team members found.</p>';
      html+='<div class="next-row"><button class="btn-add" onclick="switchPhase(2)" style="border-radius:20px;">Next — Set Today\'s Tasks →</button></div>';
      document.getElementById('phase1').innerHTML=html;
    }

    async function p1Done(id) {
      await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:'done'})});
      await loadAll(); renderStandup();
    }
    async function p1Carry(id) {
      await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({due_date:TODAY})});
      await loadAll(); renderStandup();
    }

    function renderPhase2() {
      let html='';
      allMembers.forEach(m=>{
        const tasks=allTasks.filter(t=>t.assigned_to===m.id&&(t.due_date===TODAY||t.status==='in_progress'||(isOverdue(t)&&t.due_date!==YESTERDAY)));
        const isMe=m.id===myMember?.id;
        const fname=esc((m.full_name||m.email||'').split(' ')[0]);
        html+=`
          <div style="background:#fff;border:1px solid ${isMe?'#c4b5fd':'#e5e5ea'};border-radius:14px;overflow:hidden;margin-bottom:10px;">
            <div style="display:flex;">
              <div style="width:176px;flex-shrink:0;padding:16px;border-right:1px solid #f2f2f7;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                  <div style="width:32px;height:32px;border-radius:50%;background:${isMe?'#d4c8fc':'#e8e0fd'};color:#7c3aed;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;${isMe?'border:2px solid #c4b5fd':''};">${initials(m.full_name)}</div>
                  <div style="min-width:0;">
                    <p style="font-size:13px;font-weight:700;color:#1c1c1e;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.full_name||m.email)}${isMe?'<span style="font-size:9px;font-weight:700;background:#e8e0fd;color:#7c3aed;padding:2px 6px;border-radius:20px;margin-left:4px;vertical-align:middle;">YOU</span>':''}</p>
                    <p style="font-size:10px;color:#8e8e93;margin:2px 0 0;">${esc(m.role||'')}</p>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:5px;">
                  ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:${tasks.length>i?'#7c3aed':'#e5e5ea'};"></div>`).join('')}
                  <span style="font-size:10px;color:#8e8e93;font-weight:600;margin-left:4px;">${tasks.length} task${tasks.length!==1?'s':''}</span>
                </div>
              </div>
              <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;">
                ${tasks.map((t,i)=>`
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:10px;font-weight:800;color:#d4c8fc;width:16px;flex-shrink:0;text-align:right;">${i+1}</span>
                    <div style="flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid ${t.status==='done'?'#bbf7d0':'#e5e5ea'};border-radius:10px;background:${t.status==='done'?'#f0fdf4':'#fff'};">
                      <button onclick="toggleStatus('${t.id}','${t.status}')" style="width:18px;height:18px;border-radius:50%;border:2px solid ${t.status==='done'?'#28a745':'#d1d1d6'};background:${t.status==='done'?'#28a745':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${t.status==='done'?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</button>
                      <span style="flex:1;font-size:13px;font-weight:600;color:${t.status==='done'?'#8e8e93':'#1c1c1e'};${t.status==='done'?'text-decoration:line-through;':''}overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.title)}</span>
                      <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;flex-shrink:0;${t.priority==='urgent'?'background:#fff0ef;color:#ff3b30;':t.priority==='high'?'background:#fff8e1;color:#c47f00;':t.priority==='medium'?'background:#ede9fe;color:#7c3aed;':'background:#f2f2f7;color:#8e8e93;'}">${t.priority}</span>
                      ${isOverdue(t)&&t.status!=='done'?'<span style="font-size:9px;font-weight:700;color:#ff3b30;flex-shrink:0;">overdue</span>':''}
                    </div>
                  </div>`).join('')}
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:10px;font-weight:800;color:#e5e5ea;width:16px;flex-shrink:0;text-align:right;">${tasks.length+1}</span>
                  <div style="flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px dashed #d4c8fc;border-radius:10px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="#c4b5fd"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    <input style="flex:1;background:transparent;border:none;outline:none;font-size:13px;color:#1c1c1e;font-family:inherit;" placeholder="${tasks.length===0?`What's ${isMe?'your':fname+"'s"} main focus today?`:'Add another task… press Enter'}" data-mid="${m.id}" onkeydown="if(event.key==='Enter')addMemberTask(this)"/>
                    <select data-mpri="${m.id}" style="background:transparent;border:1px solid #e5e5ea;border-radius:7px;padding:4px 8px;font-size:10px;font-weight:700;color:#7c3aed;outline:none;cursor:pointer;font-family:inherit;">
                      <option value="medium">Med</option><option value="low">Low</option><option value="high">High</option><option value="urgent">Urgent</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      });
      if (!allMembers.length) html='<p style="color:#8e8e93;font-size:13px;">No team members found.</p>';
      document.getElementById('phase2').innerHTML=html;
    }

    async function addMemberTask(inp) {
      const title=inp.value.trim();
      if (!title) return;
      const mid=inp.dataset.mid;
      const pri=document.querySelector(`select[data-mpri="${mid}"]`)?.value||'medium';
      await api('/api/tasks',{method:'POST',body:JSON.stringify({title,priority:pri,due_date:TODAY,assigned_to:mid})});
      inp.value='';
      await loadAll(); renderPhase2();
    }

    /* ── TEAM BOARD ── */
    function renderTeamBoard() {
      if (!allMembers.length) {
        document.getElementById('team-board-content').innerHTML='<p style="color:#8e8e93;text-align:center;padding:40px 0;">No team members found.</p>';
        return;
      }
      const today=TODAY;
      const inProgress=allTasks.filter(t=>t.status==='in_progress').length;
      const doneToday=allTasks.filter(t=>t.status==='done'&&(t.completed_at||'').startsWith(today)).length;
      const overdue=allTasks.filter(t=>t.status!=='done'&&t.due_date&&t.due_date<today).length;

      const statsHtml=`
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
          ${[
            {label:'TEAM MEMBERS',value:allMembers.length,color:'#1c1c1e'},
            {label:'IN PROGRESS',value:inProgress,color:'#7c3aed'},
            {label:'DONE TODAY',value:doneToday,color:'#28a745'},
            {label:'OVERDUE',value:overdue,color:overdue>0?'#ff3b30':'#8e8e93'},
          ].map(s=>`
            <div style="background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:14px 16px;text-align:center;">
              <p style="font-size:26px;font-weight:800;color:${s.color};margin:0 0 2px;">${s.value}</p>
              <p style="font-size:10px;font-weight:700;color:#8e8e93;letter-spacing:.08em;text-transform:uppercase;margin:0;">${s.label}</p>
            </div>`).join('')}
        </div>`;

      const cardsHtml=`
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
          ${allMembers.map(member=>{
            const tasks=allTasks.filter(t=>t.assigned_to===member.id);
            const done=tasks.filter(t=>t.status==='done');
            const active=tasks.filter(t=>t.status==='in_progress');
            const overdueMem=tasks.filter(t=>t.status!=='done'&&t.due_date&&t.due_date<today);
            const doneTodayM=tasks.filter(t=>t.status==='done'&&(t.completed_at||'').startsWith(today));
            const progress=tasks.length>0?Math.round((done.length/tasks.length)*100):0;
            const ini=(member.full_name||member.email||'U').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
            const activeTasks=tasks.filter(t=>t.status!=='done').slice(0,5);
            const doneTasks=done.slice(0,3);
            return `
              <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;overflow:hidden;">
                <div style="padding:16px;border-bottom:1px solid #f2f2f7;">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                      <div style="width:40px;height:40px;border-radius:50%;background:#e8e0fd;color:#7c3aed;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #d4c8fc;">${ini}</div>
                      <div>
                        <p style="font-size:14px;font-weight:700;color:#1c1c1e;margin:0 0 2px;">${esc(member.full_name||member.email)}</p>
                        <p style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin:0;">${esc(member.role||'staff')}</p>
                      </div>
                    </div>
                    <div style="text-align:right;flex-shrink:0;">
                      <p style="font-size:20px;font-weight:800;color:#1c1c1e;margin:0 0 1px;">${progress}%</p>
                      <p style="font-size:9px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin:0;">complete</p>
                    </div>
                  </div>
                  <div style="height:6px;background:#f2f2f7;border-radius:99px;overflow:hidden;margin-bottom:10px;">
                    <div style="height:100%;width:${progress}%;background:#7c3aed;border-radius:99px;transition:width .4s;"></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
                    <span style="font-size:11px;color:#8e8e93;display:flex;align-items:center;gap:4px;"><span style="color:#7c3aed;">●</span> ${active.length} active</span>
                    <span style="font-size:11px;color:#8e8e93;display:flex;align-items:center;gap:4px;"><span style="color:#28a745;">✓</span> ${doneTodayM.length} done today</span>
                    ${overdueMem.length>0?`<span style="font-size:11px;color:#ff3b30;font-weight:600;">⚡ ${overdueMem.length} overdue</span>`:''}
                  </div>
                </div>
                <div style="padding:12px;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;">
                  ${activeTasks.map(t=>{
                    const isOver=t.due_date&&t.due_date<today;
                    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid ${isOver?'#fca5a5':'#e5e5ea'};border-radius:10px;background:${isOver?'#fff5f5':'#fff'};">
                      <button onclick="toggleStatus('${t.id}','${t.status}')" style="width:18px;height:18px;border-radius:50%;border:2px solid #d1d1d6;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;"></button>
                      <span style="flex:1;font-size:12px;font-weight:500;color:#1c1c1e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.title)}</span>
                      <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;flex-shrink:0;${t.priority==='urgent'?'background:#fff0ef;color:#ff3b30;':t.priority==='high'?'background:#fff8e1;color:#c47f00;':t.priority==='medium'?'background:#ede9fe;color:#7c3aed;':'background:#f2f2f7;color:#8e8e93;'}">${t.priority}</span>
                      ${isOver?'<span style="font-size:9px;font-weight:700;color:#ff3b30;flex-shrink:0;">OVERDUE</span>':''}
                    </div>`;
                  }).join('')}
                  ${doneTasks.map(t=>`
                    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;opacity:.4;">
                      <div style="width:18px;height:18px;border-radius:50%;background:#28a745;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                      </div>
                      <span style="flex:1;font-size:12px;font-weight:500;color:#1c1c1e;text-decoration:line-through;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.title)}</span>
                    </div>`).join('')}
                  ${tasks.length===0?'<p style="font-size:12px;color:#8e8e93;text-align:center;padding:16px 0;">No tasks assigned</p>':''}
                </div>
              </div>`;
          }).join('')}
        </div>`;

      document.getElementById('team-board-content').innerHTML=statsHtml+cardsHtml;
    }

    /* ── Tab switching ── */
    function switchTab(id,btn) {
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tab-'+id).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    document.addEventListener('access-guard:ready',init);
  </script>
</body>
</html>
