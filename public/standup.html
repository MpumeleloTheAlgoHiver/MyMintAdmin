<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Daily Tasks — Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f2f2f7;color:#1c1c1e;display:flex;min-height:100vh;}
    .main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .page{padding:32px 36px 48px;max-width:980px;}
    .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8e8e93;margin-bottom:8px;}
    .page-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px;}
    .page-title{font-size:32px;font-weight:800;color:#1c1c1e;letter-spacing:-.02em;line-height:1.1;}
    .page-subtitle{font-size:13px;color:#8e8e93;margin-bottom:24px;}
    .pill-nav{display:flex;gap:4px;background:#f2f2f7;padding:4px;border-radius:12px;flex-shrink:0;margin-top:4px;}
    .pill-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:9px;border:none;background:transparent;color:#8e8e93;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
    .pill-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
    .pill-btn.active{background:#7c3aed;color:#fff;box-shadow:0 1px 4px rgba(124,58,237,.3);}
    .pill-btn:not(.active):hover{color:#3c3c43;}
    .btn-new{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#7c3aed;color:#fff;font-family:inherit;transition:background .15s;}
    .btn-new:hover{background:#6d28d9;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    .quick-card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:16px;margin-bottom:20px;}
    .quick-label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
    .quick-row{display:flex;gap:8px;align-items:center;}
    .quick-select{background:#f2f2f7;border:none;border-radius:10px;padding:9px 10px;font-size:12px;font-weight:600;color:#3c3c43;cursor:pointer;outline:none;font-family:inherit;flex-shrink:0;}
    .quick-input{flex:1;border:1px solid #e5e5ea;border-radius:10px;padding:9px 14px;font-size:14px;outline:none;font-family:inherit;color:#1c1c1e;}
    .quick-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.08);}
    .quick-input::placeholder{color:#8e8e93;}
    .priority-select{border:1px solid #e5e5ea;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;color:#7c3aed;background:#fff;outline:none;cursor:pointer;font-family:inherit;flex-shrink:0;}
    .btn-add{background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;flex-shrink:0;transition:background .15s;}
    .btn-add:hover{background:#6d28d9;}
    .section-label{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;margin:20px 0 10px;display:flex;align-items:center;gap:6px;}
    .section-label::after{content:'';flex:1;height:1px;background:#e5e5ea;}
    .section-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#f2f2f7;color:#8e8e93;font-size:10px;font-weight:700;}
    .section-toggle{background:none;border:none;cursor:pointer;color:#8e8e93;padding:0 2px;display:flex;align-items:center;margin-left:4px;}
    .section-done .section-count{background:#e8f8ef;color:#28a745;}
    .done-btn{width:20px;height:20px;border-radius:50%;border:2px solid #d1d1d6;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .done-btn:hover{border-color:#28a745;background:#f0fdf4;}
    .done-btn.done{background:#28a745;border-color:#28a745;}
    .done-btn svg{width:10px;height:10px;fill:#fff;display:none;}
    .done-btn.done svg{display:block;}
    .task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;transition:border-color .15s;}
    .task-row:hover{border-color:#c4b5fd;}
    .task-row.done-row{background:#f0fdf4;border-color:#bbf7d0;}
    .task-row.done-row .task-title{text-decoration:line-through;color:#8e8e93;}
    .task-title{flex:1;font-size:13px;color:#1c1c1e;word-break:break-word;min-width:0;line-height:1.4;}
    .task-date{font-size:11px;color:#8e8e93;flex-shrink:0;white-space:nowrap;}
    .task-date.overdue{color:#ff3b30;font-weight:700;}
    .btn-xs{padding:3px 9px;font-size:11px;border-radius:7px;border:none;font-weight:600;cursor:pointer;font-family:inherit;}
    .btn-xs:hover{opacity:.8;}
    .btn-xs-red{background:#fff0ef;color:#ff3b30;}
    .btn-xs-ghost{background:#f2f2f7;color:#3c3c43;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
    .badge-medium{background:#e8e0fd;color:#5e35b1;}
    .badge-high{background:#fff3cd;color:#7a4d00;}
    .badge-urgent{background:#fde8e8;color:#c0392b;}
    .badge-low{background:#f2f2f7;color:#8e8e93;}
    .empty-card{background:#fff;border-radius:16px;border:1px solid #e5e5ea;padding:48px 24px;text-align:center;margin-bottom:28px;}
    .empty-icon{font-size:28px;margin-bottom:12px;}
    .empty-title{font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:6px;}
    .empty-sub{font-size:13px;color:#8e8e93;}
    .next-row{display:flex;justify-content:flex-end;margin-top:16px;}
  </style>
</head>
<body>
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="page">

      <div class="page-eyebrow" id="eyebrow"></div>
      <div class="page-title-row">
        <h1 class="page-title" id="greeting"></h1>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:6px;">
          <button class="btn-new" onclick="focusQuickAdd()">+ New Task</button>
          <div class="pill-nav">
            <button class="pill-btn active" id="pillMyday" onclick="switchTab('myday',this)">
              <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
              My Day
            </button>
            <button class="pill-btn" id="pillStandup" onclick="switchTab('standup',this)">
              <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
              Standup
            </button>
            <button class="pill-btn" id="pillBoard" onclick="switchTab('board',this)">
              <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              Team Board
            </button>
            <button class="pill-btn" id="pillPerf" onclick="switchTab('perf',this)" style="display:none;">
              <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
              Performance
            </button>
          </div>
        </div>
      </div>
      <p class="page-subtitle" id="subtitle">Here's your day, own it.</p>

      <!-- MY DAY -->
      <div class="tab-pane active" id="tab-myday">
        <div class="quick-card">
          <div class="quick-label">What are you working on today?</div>
          <div class="quick-row">
            <select class="quick-select" id="quickAssignee"><option value="me">For me</option></select>
            <input class="quick-input" id="quickTitle" type="text" placeholder="Task name… press Enter or + Add"
              oninput="document.getElementById('quickDescRow').style.display=this.value.trim()?'flex':'none'"/>
            <select class="priority-select" id="quickPriority">
              <option value="medium">Medium</option>
              <option value="low">Low</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
            <button class="btn-add" onclick="quickAdd()">+ Add</button>
          </div>
          <div id="quickDescRow" style="display:none;padding:8px 4px 0;">
            <textarea id="quickDesc" rows="2" placeholder="Add a description (optional)…"
              style="width:100%;resize:none;border:1px solid #e5e5ea;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;color:#1c1c1e;background:#fafafa;outline:none;"></textarea>
          </div>
        </div>

        <!-- KPI Export -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
          <select id="myKpiMonth" style="padding:7px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:13px;font-weight:600;color:#1c1c1e;background:#fff;outline:none;cursor:pointer;font-family:inherit;"></select>
          <button onclick="exportMyKpi()" style="display:flex;align-items:center;gap:5px;padding:7px 16px;border-radius:10px;border:1px solid #bbf7d0;background:transparent;color:#28a745;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">↓ Export My KPIs</button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-week" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Done This Week</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-month" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Done This Month</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-rate" style="font-size:22px;font-weight:800;color:#7c3aed;">0%</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Completion Rate</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:14px 18px;text-align:center;">
            <div id="stat-overdue" style="font-size:22px;font-weight:800;color:#1c1c1e;">0</div>
            <div style="font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">Overdue</div>
          </div>
        </div>

        <div class="section-label">🔥 Today's Focus <span class="section-count" id="focusCount">0</span></div>
        <div id="myFocus"></div>

        <div class="section-label section-done">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#28a745"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          Done Today <span class="section-count" id="doneCount">0</span>
          <button class="section-toggle" onclick="toggleDone(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          </button>
        </div>
        <div id="myDone" class="task-list"></div>
      </div>

      <!-- STANDUP -->
      <div class="tab-pane" id="tab-standup">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <!-- Date nav -->
          <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:4px 10px;">
            <button onclick="changeStandupDate(-1)" style="background:none;border:none;cursor:pointer;color:#7c3aed;font-size:16px;padding:2px 6px;border-radius:6px;" title="Previous day">‹</button>
            <input type="date" id="standupDatePicker" max="" onchange="setStandupDate(this.value)" style="border:none;outline:none;font-size:12px;font-weight:700;color:#1c1c1e;background:transparent;cursor:pointer;font-family:inherit;text-align:center;min-width:120px;">
            <button onclick="changeStandupDate(1)" id="standupNextBtn" style="background:none;border:none;cursor:pointer;color:#7c3aed;font-size:16px;padding:2px 6px;border-radius:6px;" title="Next day">›</button>
          </div>
          <div style="display:flex;align-items:center;gap:4px;background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:4px;">
            <button id="phaseBtn1" onclick="switchPhase(1)" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:#7c3aed;color:#fff;font-family:inherit;">✓ Yesterday's Review</button>
            <button id="phaseBtn2" onclick="switchPhase(2)" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#8e8e93;font-family:inherit;">◎ Today's Tasks</button>
          </div>
          <p id="phaseHint" style="font-size:12px;color:#8e8e93;margin:0;">Was it done? Mark done, carry to today, or remove it.</p>
        </div>
        <div id="phase1"></div>
        <div id="phase2" style="display:none"></div>
      </div>

      <!-- TEAM BOARD -->
      <div class="tab-pane" id="tab-board">
        <div id="team-board-content"></div>
      </div>

      <!-- PERFORMANCE (master_admin only) -->
      <div class="tab-pane" id="tab-perf">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
          <label style="font-size:12px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;">KPI Month</label>
          <select id="kpiMonth" onchange="renderPerformance()" style="padding:7px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:13px;font-weight:600;color:#1c1c1e;background:#fff;outline:none;cursor:pointer;font-family:inherit;"></select>
        </div>
        <div id="perf-content"></div>
      </div>

      <!-- VIEW TASKS MODAL -->
      <div id="vtModal" onclick="if(event.target===this)closeVt()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:24px;">
        <div style="background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f2f2f7;">
            <div>
              <h2 id="vtName" style="font-size:17px;font-weight:800;color:#1c1c1e;margin:0;"></h2>
              <p id="vtRole" style="font-size:11px;color:#8e8e93;margin:4px 0 0;text-transform:uppercase;letter-spacing:.06em;"></p>
            </div>
            <button onclick="closeVt()" style="width:30px;height:30px;border-radius:50%;background:#f2f2f7;border:none;cursor:pointer;font-size:16px;color:#8e8e93;">✕</button>
          </div>
          <div id="vtBody" style="overflow-y:auto;padding:16px 24px;flex:1;"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/access-guard.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    /* ── Auth ── */
    function getToken() {
      try {
        const k=Object.keys(localStorage).find(k=>k.startsWith('sb-')&&k.endsWith('-auth-token'));
        return k?JSON.parse(localStorage.getItem(k))?.access_token||null:null;
      } catch { return null; }
    }

    function localDate(offsetDays=0) {
      const sast=new Date(Date.now()+2*3600000);
      sast.setUTCDate(sast.getUTCDate()+offsetDays);
      return `${sast.getUTCFullYear()}-${String(sast.getUTCMonth()+1).padStart(2,'0')}-${String(sast.getUTCDate()).padStart(2,'0')}`;
    }
    const TODAY=localDate(0), YESTERDAY=localDate(-1);

    function fmtDate(d) {
      if (!d) return '';
      const [,m,day]=d.split('-');
      return `${parseInt(day)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]}`;
    }
    function fmtDuration(start,end) {
      if (!start||!end) return null;
      const mins=Math.round((new Date(end)-new Date(start))/60000);
      if (mins<1) return '<1 min';
      if (mins<60) return `${mins} min`;
      const h=Math.floor(mins/60),m=mins%60;
      return m>0?`${h}h ${m}m`:`${h}h`;
    }
    function isOverdue(t){return t.due_date&&t.due_date<TODAY&&t.status!=='done';}
    function daysOverdue(t){if(!t.due_date||t.status==='done')return 0;const d=Math.floor((new Date(TODAY)-new Date(t.due_date))/86400000);return d>0?d:0;}
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function badge(p){return `<span class="badge badge-${p}">${p}</span>`;}
    function initials(n){return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
    function formatRole(r){return (r||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
    const CHECK='<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

    const STATUS_PILL={
      todo:        {label:'To Do',       bg:'#f2f2f7',color:'#8e8e93'},
      in_progress: {label:'In Progress', bg:'#fff3cd',color:'#7a4d00'},
      review:      {label:'Review',      bg:'#e0f0ff',color:'#0055a5'},
      done:        {label:'Done',        bg:'#e8f8ef',color:'#28a745'},
    };
    function statusPill(taskId,status,canEdit) {
      const s=STATUS_PILL[status]||STATUS_PILL.todo;
      if (!canEdit) return `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${s.bg};color:${s.color};flex-shrink:0;">${s.label}</span>`;
      return `<div style="position:relative;flex-shrink:0;" id="spill-${taskId}">
        <button onclick="toggleStatusMenu('${taskId}')" style="font-size:10px;font-weight:700;padding:2px 10px 2px 8px;border-radius:20px;background:${s.bg};color:${s.color};border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;">
          ${s.label} <svg width="8" height="8" viewBox="0 0 24 24" fill="${s.color}"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
        <div id="spill-menu-${taskId}" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #e5e5ea;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;min-width:130px;overflow:hidden;">
          ${Object.entries(STATUS_PILL).map(([k,v])=>`
            <button onclick="setStatus('${taskId}','${k}')" style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:${k===status?v.bg:'#fff'};cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:${v.color};text-align:left;">
              <span style="width:8px;height:8px;border-radius:50%;background:${v.color};flex-shrink:0;"></span>${v.label}
            </button>`).join('')}
        </div>
      </div>`;
    }
    function toggleStatusMenu(id) {
      const menu=document.getElementById('spill-menu-'+id);
      if (!menu) return;
      const open=menu.style.display!=='none';
      document.querySelectorAll('[id^="spill-menu-"]').forEach(m=>m.style.display='none');
      if (!open) menu.style.display='block';
    }
    document.addEventListener('click',e=>{
      if (!e.target.closest('[id^="spill-"]')) document.querySelectorAll('[id^="spill-menu-"]').forEach(m=>m.style.display='none');
    });
    async function setStatus(taskId,newStatus) {
      document.querySelectorAll('[id^="spill-menu-"]').forEach(m=>m.style.display='none');
      try {
        await api('/api/tasks/'+taskId,{method:'PATCH',body:JSON.stringify({status:newStatus})});
        const t=allTasks.find(t=>t.id===taskId);
        if (t) {
          t.status=newStatus;
          if (newStatus==='done') t.completed_at=new Date().toISOString();
          if (newStatus==='in_progress'&&!t.started_at) t.started_at=new Date().toISOString();
          if (newStatus!=='done') t.completed_at=null;
        }
        render();
      } catch(e){alert('Failed to update status: '+e.message);}
    }

    let allTasks=[],allMembers=[],myMember=null,isAdmin=false,doneOpen=true,standupDate=TODAY,standupSnapshot=null;

    async function api(path,opts={}) {
      const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`,...(opts.headers||{})}});
      if (!r.ok) throw new Error(await r.text());
      const t=await r.text();
      return t?JSON.parse(t):null;
    }

    async function loadAll() {
      const [tasks,members]=await Promise.all([api('/api/tasks'),api('/api/tasks?action=members')]);
      allTasks=Array.isArray(tasks)?tasks:[];
      allMembers=(Array.isArray(members)?members:[]).filter(m=>m.status!=='suspended');
      try {
        const me=await api('/api/tasks?action=me');
        if (me?.id) myMember=allMembers.find(m=>m.id===me.id)||allMembers.find(m=>(m.email||'').toLowerCase()===(me.email||'').toLowerCase())||null;
      } catch {
        myMember=null;
      }
    }

    async function init() {
      if (!getToken()) return;
      const sast=new Date(Date.now()+2*3600000);
      document.getElementById('eyebrow').textContent=sast.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'}).toUpperCase();
      await loadAll();
      isAdmin=myMember?.role==='master_admin';
      document.getElementById('pillPerf').style.display=isAdmin?'':'none';
      const h=sast.getUTCHours();
      const greet=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
      const fname=myMember?.full_name?.split(' ')[0]||'';
      document.getElementById('greeting').textContent=`${greet}${fname?', '+fname:''} 👋`;
      const sel=document.getElementById('quickAssignee');
      sel.innerHTML=`<option value="${myMember?.id||'me'}">For me</option>`;
      allMembers.filter(m=>m.id!==myMember?.id).forEach(m=>{
        sel.innerHTML+=`<option value="${m.id}">${esc(m.full_name||m.email)}</option>`;
      });
      initKpiMonthPicker();
      render();
    }

    function render(){renderMyDay();renderStandup();renderTeamBoard();if(isAdmin)renderPerformance();updateStandupBadge();}

    /* ── MY DAY ── */
    function taskRow(t,opts={}) {
      const done=t.status==='done',ov=isOverdue(t);
      const canEdit=opts.canEdit!==false;
      return `<div class="task-row${done?' done-row':''}" id="row-${t.id}">
        <button class="done-btn${done?' done':''}" onclick="toggleStatus('${t.id}','${t.status}')" style="margin-top:1px;flex-shrink:0;">${CHECK}</button>
        <span class="task-title">${esc(t.title)}</span>
        ${statusPill(t.id,t.status,canEdit)}
        ${badge(t.priority)}
        ${t.due_date?`<span class="task-date${ov?' overdue':''}">${fmtDate(t.due_date)}${ov?' ⚠':''}</span>`:''}
        ${canEdit&&opts.del?`<button class="btn-xs btn-xs-red" onclick="deleteTask('${t.id}')">✕</button>`:''}
      </div>`;
    }

    function renderMyDay() {
      const myId=myMember?.id;
      const focus=allTasks.filter(t=>t.assigned_to===myId&&t.status!=='done'&&(t.due_date===TODAY||t.status==='in_progress'||(t.due_date&&t.due_date<TODAY)));
      const done=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at?.slice(0,10)===TODAY);
      document.getElementById('focusCount').textContent=focus.length;
      document.getElementById('doneCount').textContent=done.length;
      document.getElementById('myFocus').innerHTML=focus.length
        ?`<div class="task-list">${focus.map(t=>taskRow(t,{del:true})).join('')}</div>`
        :`<div class="empty-card"><div class="empty-icon">✅</div><div class="empty-title">Nothing due today</div><div class="empty-sub">Add something above or check your upcoming tasks.</div></div>`;
      document.getElementById('myDone').innerHTML=done.length?done.map(t=>taskRow(t,{del:true})).join(''):'';
      document.getElementById('myDone').style.display=doneOpen?'':'none';
      const weekStr=localDate(-7);
      const doneWeek=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at&&t.completed_at.slice(0,10)>=weekStr).length;
      const doneMonth=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done'&&t.completed_at&&t.completed_at.slice(0,7)===TODAY.slice(0,7)).length;
      const myAll=allTasks.filter(t=>t.assigned_to===myId).length;
      const myDoneAll=allTasks.filter(t=>t.assigned_to===myId&&t.status==='done').length;
      const pct=myAll>0?Math.round(myDoneAll/myAll*100):0;
      const myOv=allTasks.filter(t=>t.assigned_to===myId&&isOverdue(t)).length;
      document.getElementById('stat-week').textContent=doneWeek;
      document.getElementById('stat-month').textContent=doneMonth;
      document.getElementById('stat-rate').textContent=pct+'%';
      document.getElementById('stat-overdue').textContent=myOv;
      document.getElementById('stat-overdue').style.color=myOv>0?'#ff3b30':'#1c1c1e';
    }

    function toggleDone(btn) {
      doneOpen=!doneOpen;
      document.getElementById('myDone').style.display=doneOpen?'':'none';
      btn.innerHTML=doneOpen
        ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>'
        :'<svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z"/></svg>';
    }

    async function quickAdd() {
      const inp=document.getElementById('quickTitle');
      const title=inp.value.trim();
      if (!title) return;
      const val=document.getElementById('quickAssignee').value;
      const assignId=(val&&val!=='me')?val:(myMember?.id||null);
      const desc=(document.getElementById('quickDesc')?.value||'').trim();
      try {
        await api('/api/tasks',{method:'POST',body:JSON.stringify({title,description:desc||null,priority:document.getElementById('quickPriority').value,due_date:TODAY,assigned_to:assignId})});
        inp.value='';
        const descEl=document.getElementById('quickDesc');
        if(descEl) descEl.value='';
        document.getElementById('quickDescRow').style.display='none';
        await loadAll();render();
      } catch(err){alert('Failed to add task: '+err.message);}
    }

    function focusQuickAdd(){switchTab('myday',document.getElementById('pillMyday'));document.getElementById('quickTitle').focus();}
    document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&document.activeElement?.id==='quickTitle'){e.preventDefault();quickAdd();}});

    async function toggleStatus(id,cur) {
      try {
        await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:cur==='done'?'todo':'done'})});
        await loadAll();render();
      } catch(err){alert('Failed to update task: '+err.message);}
    }
    async function deleteTask(id) {
      try {
        await api(`/api/tasks/${id}`,{method:'DELETE'});
        allTasks=allTasks.filter(t=>t.id!==id);
        render();
      } catch(err){alert('Failed to delete task: '+err.message);}
    }

    /* ── STANDUP ── */
    function renderStandup(){updateStandupDateLabel();renderPhase1();renderPhase2();}

    function updateStandupDateLabel() {
      const picker=document.getElementById('standupDatePicker');
      picker.value=standupDate;
      picker.max=TODAY;
      document.getElementById('standupNextBtn').style.opacity=standupDate>=TODAY?'0.3':'1';
      document.getElementById('standupNextBtn').disabled=standupDate>=TODAY;
    }

    async function loadSnapshot(date) {
      if (date >= TODAY) { standupSnapshot=null; return; }
      try {
        const r = await api(`/api/standup-log?date=${date}`);
        standupSnapshot = (r && !r.live) ? r : null;
      } catch { standupSnapshot=null; }
    }

    async function setStandupDate(val) {
      if(!val||val>TODAY) return;
      standupDate=val;
      await loadSnapshot(val);
      renderStandup();
    }

    async function changeStandupDate(delta) {
      const d=new Date(standupDate+'T00:00:00Z');
      d.setUTCDate(d.getUTCDate()+delta);
      const newDate=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
      if(newDate>TODAY) return;
      standupDate=newDate;
      await loadSnapshot(newDate);
      renderStandup();
    }

    function switchPhase(n) {
      document.getElementById('phase1').style.display=n===1?'':'none';
      document.getElementById('phase2').style.display=n===2?'':'none';
      const on='display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:#7c3aed;color:#fff;font-family:inherit;';
      const off='display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#8e8e93;font-family:inherit;';
      document.getElementById('phaseBtn1').style.cssText=n===1?on:off;
      document.getElementById('phaseBtn2').style.cssText=n===2?on:off;
      const hint=document.getElementById('phaseHint');
      if(hint) hint.textContent=n===1?'Was it done? Mark done, carry to today, or remove it.':'What are your 3 main tasks for today?';
    }

    function renderPhase1() {
      const prevDate=(()=>{const d=new Date(standupDate+'T00:00:00Z');d.setUTCDate(d.getUTCDate()-1);return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;})();
      const unfinished=allTasks.filter(t=>t.due_date===prevDate&&t.status!=='done');
      let html='';
      allMembers.forEach(m=>{
        const tasks=unfinished.filter(t=>t.assigned_to===m.id);
        const has=tasks.length>0;
        const canEdit=isAdmin||m.id===myMember?.id;
        html+=`
          <div style="background:#fff;border:1px solid ${has?'#d4c8fc':'#e5e5ea'};border-radius:14px;overflow:hidden;margin-bottom:10px;${!has?'opacity:.6':''}">
            <div style="display:flex;">
              <div style="width:176px;flex-shrink:0;padding:16px;border-right:1px solid #f2f2f7;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                  <div style="width:32px;height:32px;border-radius:50%;background:${has?'#e8e0fd':'#e8f8ef'};color:${has?'#7c3aed':'#28a745'};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials(m.full_name)}</div>
                  <div style="min-width:0;">
                    <p style="font-size:13px;font-weight:700;color:#1c1c1e;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.full_name||m.email)}</p>
                    <p style="font-size:10px;color:#8e8e93;margin:2px 0 0;">${esc(formatRole(m.role))}</p>
                  </div>
                </div>
                ${!has?`<div style="display:flex;align-items:center;gap:5px;color:#28a745;font-size:11px;font-weight:700;"><svg width="12" height="12" viewBox="0 0 24 24" fill="#28a745"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> All done</div>`:''}
              </div>
              <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;">
                ${!has
                  ?`<p style="font-size:12px;color:#8e8e93;">Nothing carried from yesterday</p>`
                  :tasks.map(t=>`
                    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#fff8f0;border:1px solid #fde8c8;border-radius:10px;">
                      <span style="flex:1;font-size:13px;font-weight:600;color:#1c1c1e;word-break:break-word;min-width:0;line-height:1.4;">${esc(t.title)}</span>
                      ${canEdit?`<div style="display:flex;gap:6px;flex-shrink:0;">
                        <button onclick="p1Done('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#e8f8ef;border:1px solid #bbf7d0;color:#28a745;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;"><svg width="11" height="11" viewBox="0 0 24 24" fill="#28a745"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Done</button>
                        <button onclick="p1Carry('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#e8e0fd;border:1px solid #c4b5fd;color:#7c3aed;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">→ Carry</button>
                        <button onclick="deleteTask('${t.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#fff0ef;border:1px solid #fca5a5;color:#ff3b30;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">✕ Remove</button>
                      </div>`:''}
                    </div>`).join('')
                }
              </div>
            </div>
          </div>`;
      });
      if (!allMembers.length) html='<p style="color:#8e8e93;font-size:13px;">No team members found.</p>';
      html+='<div class="next-row"><button class="btn-add" onclick="switchPhase(2)" style="border-radius:20px;">Next — Set Today\'s Tasks →</button></div>';
      document.getElementById('phase1').innerHTML=html;
    }

    async function p1Done(id){await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:'done'})});await loadAll();renderStandup();}
    async function p1Carry(id){await api(`/api/tasks/${id}`,{method:'PATCH',body:JSON.stringify({due_date:TODAY})});await loadAll();renderStandup();}

    function renderPhase2() {
      const isToday=standupDate===TODAY;
      const isPast=standupDate<TODAY;
      // For past dates use snapshot rows; for today use live allTasks
      const snapRows=standupSnapshot?.rows||null;
      const myTodayCount=allTasks.filter(t=>t.assigned_to===myMember?.id&&t.status!=='done'&&(t.due_date===standupDate||t.status==='in_progress')).length;
      document.getElementById('phaseBtn2').textContent=myTodayCount>0?`◎ ${isToday?"Today's":'Tasks'} ${myTodayCount}`:`◎ ${isToday?"Today's Tasks":'Tasks'}`;
      let html='';
      if (isPast && snapRows && standupSnapshot?.fallback===false) {
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 14px;background:#ede9fe;border-radius:10px;font-size:12px;color:#7c3aed;font-weight:600;">📸 Snapshot — ${new Date(standupDate+'T00:00:00Z').toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'})}</div>`;
      } else if (isPast && snapRows && standupSnapshot?.fallback===true) {
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 14px;background:#fff8e1;border-radius:10px;font-size:12px;color:#c47f00;font-weight:600;">⚠ No snapshot for this date — showing tasks by due date</div>`;
      }
      allMembers.forEach(m=>{
        let tasks;
        if (isPast && snapRows) {
          tasks=snapRows.filter(r=>r.member_id===m.id);
        } else {
          tasks=allTasks.filter(t=>t.assigned_to===m.id&&(t.due_date===standupDate||(isToday&&(t.status==='in_progress'||(isOverdue(t))))));
        }
        const isMe=m.id===myMember?.id;
        const canEdit=(!isPast)&&(isAdmin||isMe);
        const fname=esc((m.full_name||m.email||'').split(' ')[0]);
        html+=`
          <div style="background:#fff;border:1px solid ${isMe?'#c4b5fd':'#e5e5ea'};border-radius:14px;overflow:hidden;margin-bottom:10px;">
            <div style="display:flex;">
              <div style="width:176px;flex-shrink:0;padding:16px;border-right:1px solid #f2f2f7;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                  <div style="width:32px;height:32px;border-radius:50%;background:${isMe?'#d4c8fc':'#e8e0fd'};color:#7c3aed;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;${isMe?'border:2px solid #c4b5fd':''};">${initials(m.full_name)}</div>
                  <div style="min-width:0;">
                    <p style="font-size:13px;font-weight:700;color:#1c1c1e;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.full_name||m.email)}${isMe?'<span style="font-size:9px;font-weight:700;background:#e8e0fd;color:#7c3aed;padding:2px 6px;border-radius:20px;margin-left:4px;vertical-align:middle;">YOU</span>':''}</p>
                    <p style="font-size:10px;color:#8e8e93;margin:2px 0 0;">${esc(formatRole(m.role))}</p>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:5px;">
                  ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:${tasks.length>i?'#7c3aed':'#e5e5ea'};"></div>`).join('')}
                  <span style="font-size:10px;color:#8e8e93;font-weight:600;margin-left:4px;">${tasks.length} task${tasks.length!==1?'s':''}</span>
                </div>
              </div>
              <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;min-width:0;">
                ${tasks.map((t,i)=>`
                  <div style="display:flex;align-items:flex-start;gap:8px;">
                    <span style="font-size:10px;font-weight:800;color:#d4c8fc;width:16px;flex-shrink:0;text-align:right;padding-top:2px;">${i+1}</span>
                    <div style="flex:1;display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1px solid ${t.status==='done'?'#bbf7d0':'#e5e5ea'};border-radius:10px;background:${t.status==='done'?'#f0fdf4':'#fff'};min-width:0;">
                      ${canEdit
                        ?`<button onclick="toggleStatus('${t.id}','${t.status}')" style="width:18px;height:18px;border-radius:50%;border:2px solid ${t.status==='done'?'#28a745':'#d1d1d6'};background:${t.status==='done'?'#28a745':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${t.status==='done'?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</button>`
                        :`<div style="width:18px;height:18px;border-radius:50%;border:2px solid ${t.status==='done'?'#28a745':'#d1d1d6'};background:${t.status==='done'?'#28a745':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${t.status==='done'?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>`
                      }
                      <span style="flex:1;font-size:13px;font-weight:600;color:${t.status==='done'?'#8e8e93':'#1c1c1e'};${t.status==='done'?'text-decoration:line-through;':''}word-break:break-word;min-width:0;line-height:1.4;">${esc(t.title)}</span>
                      <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;flex-shrink:0;${t.priority==='urgent'?'background:#fff0ef;color:#ff3b30;':t.priority==='high'?'background:#fff8e1;color:#c47f00;':t.priority==='medium'?'background:#ede9fe;color:#7c3aed;':'background:#f2f2f7;color:#8e8e93;'}">${t.priority}</span>
                      ${isOverdue(t)&&t.status!=='done'?'<span style="font-size:9px;font-weight:700;color:#ff3b30;flex-shrink:0;">overdue</span>':''}
                      ${canEdit?`<button onclick="deleteTask('${t.id}')" style="background:none;border:none;cursor:pointer;color:#d1d1d6;font-size:13px;flex-shrink:0;padding:0 2px;line-height:1;" onmouseover="this.style.color='#ff3b30'" onmouseout="this.style.color='#d1d1d6'">✕</button>`:''}
                    </div>
                  </div>`).join('')}
                ${canEdit?`<div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:10px;font-weight:800;color:#e5e5ea;width:16px;flex-shrink:0;text-align:right;">${tasks.length+1}</span>
                  <div style="flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px dashed #d4c8fc;border-radius:10px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="#c4b5fd"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    <input style="flex:1;background:transparent;border:none;outline:none;font-size:13px;color:#1c1c1e;font-family:inherit;" placeholder="${tasks.length===0?`What's ${isMe?'your':fname+"'s"} main focus today?`:'Add another task… press Enter'}" data-mid="${m.id}" onkeydown="if(event.key==='Enter')addMemberTask(this)"/>
                    <select data-mpri="${m.id}" style="background:transparent;border:1px solid #e5e5ea;border-radius:7px;padding:4px 8px;font-size:10px;font-weight:700;color:#7c3aed;outline:none;cursor:pointer;font-family:inherit;">
                      <option value="medium">Med</option><option value="low">Low</option><option value="high">High</option><option value="urgent">Urgent</option>
                    </select>
                  </div>
                </div>`:''}
              </div>
            </div>
          </div>`;
      });
      if (!allMembers.length) html='<p style="color:#8e8e93;font-size:13px;">No team members found.</p>';
      document.getElementById('phase2').innerHTML=html;
    }

    async function addMemberTask(inp) {
      const title=inp.value.trim();if(!title)return;
      const mid=inp.dataset.mid;
      const pri=document.querySelector(`select[data-mpri="${mid}"]`)?.value||'medium';
      await api('/api/tasks',{method:'POST',body:JSON.stringify({title,priority:pri,due_date:TODAY,assigned_to:mid})});
      inp.value='';
      await loadAll();renderPhase2();
    }

    /* ── TEAM BOARD ── */
    function renderTeamBoard() {
      if (!allMembers.length){document.getElementById('team-board-content').innerHTML='<p style="color:#8e8e93;text-align:center;padding:40px 0;">No team members found.</p>';return;}
      const today=TODAY;
      const inProgress=allTasks.filter(t=>t.status==='in_progress').length;
      const doneToday=allTasks.filter(t=>t.status==='done'&&(t.completed_at||'').startsWith(today)).length;
      const overdue=allTasks.filter(t=>t.status!=='done'&&t.due_date&&t.due_date<today).length;

                  <div style="width:40px;height:40px;border-radius:50%;background:#e8e0fd;color:#7c3aed;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #d4c8fc;">${ini}</div>
                  <div>
                    <p style="font-size:14px;font-weight:700;color:#1c1c1e;margin:0 0 2px;">${esc(member.full_name||member.email)}</p>

                  ${isOver?`<span style="font-size:9px;font-weight:700;color:#ff3b30;flex-shrink:0;" title="${daysOverdue(t)} days overdue">${daysOverdue(t)>=5?'🚨':'⚠'} ${daysOverdue(t)}d</span>`:''}

    /* ── PERFORMANCE ── */
    function initKpiMonthPicker() {
      ['kpiMonth','myKpiMonth'].forEach(id=>{
        const sel=document.getElementById(id);
        if(!sel||sel.options.length) return;
        const now=new Date(Date.now()+2*3600000);
        for(let i=0;i<12;i++){
          const d=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth()-i,1));
          const val=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`;
          const label=d.toLocaleString('en-ZA',{month:'long',year:'numeric',timeZone:'UTC'});
          const opt=document.createElement('option');
          opt.value=val;opt.textContent=label;sel.appendChild(opt);
        }
      });
    }

    function renderPerformance() {
      const sel=document.getElementById('kpiMonth');
      const today=TODAY;
      const stats=allMembers.map(m=>{
        const tasks=allTasks.filter(t=>t.assigned_to===m.id);
        const done=tasks.filter(t=>t.status==='done');
        const overdue=tasks.filter(t=>isOverdue(t));
        const late=tasks.filter(t=>t.status==='done'&&t.completed_at&&t.due_date&&t.completed_at.slice(0,10)>t.due_date);
        const todayDone=done.filter(t=>(t.completed_at||'').startsWith(today));
        const todayCommitted=tasks.filter(t=>t.status!=='done'&&(t.due_date===today||t.status==='in_progress'||(t.due_date&&t.due_date<today)));
        const rate=tasks.length>0?Math.round((done.length/tasks.length)*100):0;
        const acct=todayCommitted.length>0?Math.round((todayDone.length/todayCommitted.length)*100):100;
        return {m,tasks,done,overdue,late,todayDone,todayCommitted,rate,acct};

              <div style="text-align:center;"><p style="font-size:24px;font-weight:800;color:${s.overdue.length>0?'#ff3b30':'#28a745'};margin:0 0 2px;">${s.overdue.length}</p><p style="font-size:9px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin:0;">Overdue</p></div>

    /* ── KPI PDF Export ── */
    function generateKpiPdf(member,tasks,monthLabel) {
      const ini=initials(member.full_name||member.email);
      const role=formatRole(member.role||'');
      const done=tasks.length;
      const timedTasks=tasks.filter(t=>t.started_at&&t.completed_at);
      const avgMins=timedTasks.length?Math.round(timedTasks.reduce((s,t)=>s+(new Date(t.completed_at)-new Date(t.started_at))/60000,0)/timedTasks.length):0;
      const avgTime=avgMins>0?(avgMins<60?`${avgMins} min`:`${Math.floor(avgMins/60)}h ${avgMins%60?avgMins%60+'m':''}`.trim()):null;
      const priColor=p=>p==='urgent'?'color:#ff3b30;background:#fff0ef':p==='high'?'color:#c47f00;background:#fff8e1':p==='medium'?'color:#7c3aed;background:#ede9fe':'color:#8e8e93;background:#f2f2f7';
      const rows=tasks.map((t,i)=>`<tr style="border-bottom:1px solid #f2f2f7;">
        <td style="padding:10px 12px;font-size:12px;color:#8e8e93;font-weight:700;width:28px;">${i+1}</td>
        <td style="padding:10px 12px;"><div style="font-size:13px;font-weight:600;color:#1c1c1e;">${esc(t.title)}</div>${t.description?`<div style="font-size:11px;color:#8e8e93;margin-top:2px;">${esc(t.description)}</div>`:''}</td>
        <td style="padding:10px 12px;white-space:nowrap;"><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;${priColor(t.priority)}">${t.priority}</span></td>
        <td style="padding:10px 12px;font-size:12px;color:#8e8e93;white-space:nowrap;">${t.due_date||'—'}</td>
        <td style="padding:10px 12px;font-size:12px;color:#28a745;font-weight:600;white-space:nowrap;">${(t.completed_at||'').slice(0,10)||'—'}</td>
        <td style="padding:10px 12px;font-size:12px;color:#7c3aed;font-weight:600;white-space:nowrap;">${fmtDuration(t.started_at,t.completed_at)||'—'}</td>
      </tr>`).join('');
      const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KPI Report — ${esc(member.full_name||member.email)} — ${monthLabel}</title>
      <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#fff;color:#1c1c1e;-webkit-print-color-adjust:exact;print-color-adjust:exact;}@page{margin:0;size:A4;}@media print{body{margin:0;}}</style>
      </head><body>
      <div style="background:linear-gradient(135deg,#5b21b6 0%,#7c3aed 60%,#a855f7 100%);padding:40px 48px 36px;color:#fff;">

          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <div><div style="font-size:15px;font-weight:800;letter-spacing:.02em;">MINT HUB</div><div style="font-size:10px;opacity:.7;letter-spacing:.1em;text-transform:uppercase;">Mint Internal Platform</div></div>
          </div>
          <div style="text-align:right;"><div style="font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.08em;">KPI Report</div><div style="font-size:13px;font-weight:700;margin-top:2px;">${monthLabel}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;">${ini}</div>
          <div><div style="font-size:22px;font-weight:800;">${esc(member.full_name||member.email)}</div><div style="font-size:12px;opacity:.75;margin-top:3px;text-transform:uppercase;letter-spacing:.07em;">${role}</div></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #f2f2f7;">
        ${[{label:'Tasks Completed',value:done,color:'#7c3aed'},{label:'Urgent / High',value:`${tasks.filter(t=>t.priority==='urgent').length} / ${tasks.filter(t=>t.priority==='high').length}`,color:'#ff3b30'},{label:'Avg Time Spent',value:avgTime||'—',color:'#28a745'},{label:'On Time',value:tasks.filter(t=>!t.due_date||(t.completed_at||'').slice(0,10)<=t.due_date).length,color:'#0055a5'}]
          .map(s=>`<div style="padding:20px 24px;border-right:1px solid #f2f2f7;text-align:center;"><div style="font-size:26px;font-weight:800;color:${s.color};">${s.value}</div><div style="font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;margin-top:4px;font-weight:600;">${s.label}</div></div>`).join('')}

        <table style="width:100%;border-collapse:collapse;border:1px solid #f2f2f7;border-radius:12px;overflow:hidden;">
          <thead><tr style="background:#f9f9fb;">
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">#</th>
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">Task</th>
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">Priority</th>
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">Due</th>
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">Completed</th>
            <th style="padding:10px 12px;font-size:10px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.07em;text-align:left;">Time Spent</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${!tasks.length?'<p style="text-align:center;color:#8e8e93;padding:40px 0;font-size:13px;">No completed tasks for this period.</p>':''}

        <div style="display:flex;align-items:center;gap:6px;"><div style="width:16px;height:16px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:4px;"></div><span style="font-size:11px;font-weight:700;color:#7c3aed;">MINT HUB</span></div>
      </div>
      <script>window.onload=()=>{window.print();}<\/script>
      </body></html>`;
      const w=window.open('','_blank','width=900,height=700');
      w.document.write(html);w.document.close();
    }

    function exportMyKpi() {
      if (!myMember) return alert('Could not identify your profile.');
      const sel=document.getElementById('myKpiMonth');
      const monthPrefix=sel?sel.value:TODAY.slice(0,7);
      const monthLabel=sel?sel.options[sel.selectedIndex].text:monthPrefix;
      const tasks=allTasks.filter(t=>t.assigned_to===myMember.id&&t.status==='done'&&(t.completed_at||'').startsWith(monthPrefix));
      if (!tasks.length) return alert(`No completed tasks for ${monthLabel}.`);
      generateKpiPdf(myMember,tasks,monthLabel);
    }
    function exportKpi(memberId) {
      const sel=document.getElementById('kpiMonth');
      const monthPrefix=sel?sel.value:TODAY.slice(0,7);
      const monthLabel=sel?sel.options[sel.selectedIndex].text:monthPrefix;
      const member=allMembers.find(m=>m.id===memberId);if(!member)return;
      const tasks=allTasks.filter(t=>t.assigned_to===memberId&&t.status==='done'&&(t.completed_at||'').startsWith(monthPrefix));
      if (!tasks.length) return alert(`No completed tasks for ${member.full_name||member.email} in ${monthLabel}.`);
      generateKpiPdf(member,tasks,monthLabel);
    }

    /* ── View Tasks modal ── */
    function openVt(memberId) {
      const member=allMembers.find(m=>m.id===memberId);if(!member)return;
      const tasks=allTasks.filter(t=>t.assigned_to===memberId).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      document.getElementById('vtName').textContent=member.full_name||member.email;
      document.getElementById('vtRole').textContent=formatRole(member.role||'');
      const groups=[{label:'In Progress',items:tasks.filter(t=>t.status==='in_progress')},{label:'To Do',items:tasks.filter(t=>t.status==='todo'||t.status==='pending')},{label:'Review',items:tasks.filter(t=>t.status==='review')},{label:'Done',items:tasks.filter(t=>t.status==='done')}].filter(g=>g.items.length);
      const sStyle=s=>({todo:'background:#f2f2f7;color:#8e8e93',in_progress:'background:#fff3cd;color:#7a4d00',review:'background:#e0f0ff;color:#0055a5',done:'background:#e8f8ef;color:#28a745'}[s]||'background:#f2f2f7;color:#8e8e93');
      const sLabel=s=>({todo:'To Do',in_progress:'In Progress',review:'Review',done:'Done'}[s]||s);
      const pStyle=p=>p==='urgent'?'background:#fff0ef;color:#ff3b30':p==='high'?'background:#fff8e1;color:#c47f00':p==='medium'?'background:#ede9fe;color:#7c3aed':'background:#f2f2f7;color:#8e8e93';
      let html='';
      if(!tasks.length) html='<p style="color:#8e8e93;font-size:13px;text-align:center;padding:32px 0;">No tasks found.</p>';
      groups.forEach(g=>{
        html+=`<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8e8e93;margin:12px 0 6px;">${esc(g.label)} (${g.items.length})</p>`;
        g.items.forEach(t=>{
          const done=t.status==='done';const over=isOverdue(t);
          html+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:${done?'#f0fdf4':'#fff'};border:1px solid ${done?'#bbf7d0':over?'#fca5a5':'#e5e5ea'};border-radius:10px;margin-bottom:6px;">
            <div style="width:16px;height:16px;border-radius:50%;border:2px solid ${done?'#28a745':'#d1d1d6'};background:${done?'#28a745':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${done?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
            <div style="flex:1;min-width:0;">
              <span style="font-size:13px;font-weight:600;color:${done?'#8e8e93':'#1c1c1e'};${done?'text-decoration:line-through;':''}word-break:break-word;line-height:1.4;display:block;">${esc(t.title)}</span>
              ${fmtDuration(t.started_at,t.completed_at)?`<span style="font-size:10px;color:#7c3aed;font-weight:600;">⏱ ${fmtDuration(t.started_at,t.completed_at)}</span>`:''}
            </div>
            <span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;${sStyle(t.status)};flex-shrink:0;">${sLabel(t.status)}</span>
            <span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;${pStyle(t.priority)};flex-shrink:0;">${t.priority}</span>
            <span style="font-size:10px;color:${over&&!done?'#ff3b30':'#8e8e93'};flex-shrink:0;">${t.due_date||''}</span>
          </div>`;
        });
      });
      document.getElementById('vtBody').innerHTML=html;
      const modal=document.getElementById('vtModal');
      modal.style.display='flex';
    }
    function closeVt(){document.getElementById('vtModal').style.display='none';}

    /* ── Drill-down: team board overdue → standup date ── */
    function drillToDate(memberId) {
      const overdueTasks=allTasks.filter(t=>t.assigned_to===memberId&&isOverdue(t));
      if(!overdueTasks.length) return;
      // jump to the earliest overdue date
      const earliest=overdueTasks.map(t=>t.due_date).sort()[0];
      standupDate=earliest;
      switchTab('standup',document.getElementById('pillStandup'));
      switchPhase(2);
      renderStandup();
    }

    /* ── Sidebar badge ── */
    function updateStandupBadge() {
      const count=myMember?allTasks.filter(t=>t.assigned_to===myMember.id&&t.status!=='done'&&(t.due_date===TODAY||t.status==='in_progress')).length:0;
      const link=document.querySelector('a[href="/standup.html"]');if(!link)return;
      let badge=link.querySelector('.nav-pending-count');
      if(!badge){badge=document.createElement('span');badge.className='nav-pending-count';link.appendChild(badge);}
      badge.textContent=count;
      count>0?badge.classList.add('visible'):badge.classList.remove('visible');
    }

    /* ── Tab switching ── */
    const TAB_META={
      myday:{title:()=>{const h=new Date(Date.now()+2*3600000).getUTCHours();return(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+(myMember?.full_name?.split(' ')[0]?', '+myMember.full_name.split(' ')[0]:'')+' 👋';},sub:"Here's your day, own it."},
      standup:{title:'Daily Standup',sub:'What is everyone working on today?'},
      board:{title:'Team Board',sub:'Live view of where the team is right now.'},
      perf:{title:'Performance',sub:'Accountability scores based on committed vs completed tasks.'},
    };
    function switchTab(id,btn) {
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tab-'+id).classList.add('active');
      if(btn) btn.classList.add('active');
      const meta=TAB_META[id];
      if(meta){
        document.getElementById('greeting').textContent=typeof meta.title==='function'?meta.title():meta.title;
        document.getElementById('subtitle').textContent=meta.sub;
      }
    }

    window.addEventListener('access-guard:ready',init);
  </script>
</body>
</html>
