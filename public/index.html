<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Profiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #f7f7f8;
      --bg2:      #ffffff;
      --surface:  #ffffff;
      --surface2: #f4f4f6;
      --surface3: #eeeff2;
      --border:   #e5e5ea;
      --border2:  #f0f0f4;
      --text:     #0f0f12;
      --text2:    #52525e;
      --text3:    #a1a1ad;
      --accent:   #6c47ff;
      --accent2:  #8b6fff;
      --accent-soft: rgba(108,71,255,0.08);
      --accent-ring: rgba(108,71,255,0.18);
      --green:    #16a34a;
      --green-bg: #f0fdf4;
      --green-bd: #bbf7d0;
      --amber:    #b45309;
      --amber-bg: #fffbeb;
      --amber-bd: #fde68a;
      --red:      #dc2626;
      --red-bg:   #fef2f2;
      --red-bd:   #fecaca;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:    0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
      --sidebar-w: 60px;
      --font: 'Geist', system-ui, sans-serif;
      --mono: 'Geist Mono', monospace;
    }

    html { scrollbar-color: #e5e5ea #fff; scrollbar-width: thin; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #fff; }
    ::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 3px; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; left: 0; top: 0;
      width: var(--sidebar-w); height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; padding: 16px 0;
      z-index: 100;
    }

    .sidebar-logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 4px 14px rgba(108,71,255,0.35);
      cursor: pointer; flex-shrink: 0;
    }
    .sidebar-logo svg { width: 16px; height: 16px; fill: #fff; }

    .nav-icon {
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.14s;
      color: var(--text3); text-decoration: none; position: relative;
    }
    .nav-icon svg { width: 17px; height: 17px; fill: currentColor; }
    .nav-icon:hover { background: var(--surface2); color: var(--text2); }
    .nav-icon.active { background: var(--accent-soft); color: var(--accent); }
    .nav-icon.active::after {
      content: '';
      position: absolute; left: -1px; top: 50%;
      transform: translateY(-50%);
      width: 2px; height: 18px;
      background: var(--accent); border-radius: 0 2px 2px 0;
    }

    .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .sidebar-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; cursor: pointer;
      border: 2px solid var(--border);
    }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    .topbar {
      height: 52px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; gap: 14px;
      position: sticky; top: 0; z-index: 50;
    }

    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text3); }
    .breadcrumb svg { width: 11px; height: 11px; fill: var(--text3); }
    .breadcrumb .active { color: var(--text); font-weight: 500; }

    .search-wrap { flex: 1; max-width: 340px; margin-left: auto; position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; fill: var(--text3); pointer-events: none; }
    .search-wrap input {
      width: 100%; height: 32px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 0 10px 0 30px;
      font-family: var(--font); font-size: 12.5px; color: var(--text);
      outline: none; transition: border-color 0.14s, box-shadow 0.14s, background 0.14s;
    }
    .search-wrap input::placeholder { color: var(--text3); }
    .search-wrap input:focus { background: #fff; border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-ring); }

    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .topbar-btn {
      height: 30px; padding: 0 12px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text2); font-family: var(--font);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.14s; display: flex; align-items: center; gap: 5px;
    }
    .topbar-btn svg { width: 12px; height: 12px; fill: currentColor; }
    .topbar-btn:hover { background: var(--surface2); color: var(--text); border-color: #d4d4dc; }

    /* ── CONTENT ── */
    .content { padding: 24px; flex: 1; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.25px; }

    .count-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      background: var(--bg2); border: 1px solid var(--border);
      font-size: 12px; color: var(--text2); font-weight: 500;
      box-shadow: var(--shadow-sm);
    }
    .count-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); animation: breathe 2s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.45} }
    .count-chip strong { color: var(--text); }

    /* ── FILTER STRIP ── */
    .filter-strip { display: flex; align-items: center; gap: 5px; margin-bottom: 16px; flex-wrap: wrap; }

    .filter-pill {
      height: 28px; padding: 0 11px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text3); font-family: var(--font);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.13s; white-space: nowrap;
    }
    .filter-pill:hover { background: var(--surface2); color: var(--text2); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    .bank-wrap { position: relative; }
    .bank-menu {
      position: absolute; top: calc(100% + 5px); left: 0;
      min-width: 150px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 4px; display: none; z-index: 60;
      box-shadow: var(--shadow-lg);
    }
    .bank-menu.open { display: block; animation: popIn .14s ease; }
    @keyframes popIn { from{opacity:0;transform:scale(.97) translateY(-4px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .bank-opt {
      width: 100%; border: none; background: transparent;
      text-align: left; padding: 7px 9px; border-radius: 6px;
      font-family: var(--font); font-size: 12px; color: var(--text2);
      cursor: pointer; transition: background .12s; display: flex; align-items: center; gap: 7px;
    }
    .bank-opt:hover { background: var(--surface2); color: var(--text); }
    .bank-opt.active { color: var(--accent); font-weight: 500; }
    .bank-opt.active::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; }

    /* ── PROFILES LIST ── */
    .profiles-list {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .profile-item { border-bottom: 1px solid var(--border2); }
    .profile-item:last-child { border-bottom: none; }

    .profile-row {
      display: flex; align-items: center;
      padding: 11px 16px; gap: 13px; cursor: pointer;
      transition: background .13s;
    }
    .profile-row:hover { background: #fafafa; }

    .profile-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
      letter-spacing: .3px; transition: box-shadow .18s;
    }
    .profile-avatar.signed-in { box-shadow: 0 0 0 2.5px var(--green-bg), 0 0 0 4px var(--green); }

    .profile-info { flex: 1; min-width: 0; }
    .profile-name { font-size: 13.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
    .profile-uid { font-family: var(--mono); font-size: 10.5px; color: var(--text3); }

    .profile-meta { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }

    /* Signed-in badge */
    .signed-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 500;
      background: var(--green-bg); border: 1px solid var(--green-bd); color: var(--green);
    }
    .signed-badge::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--green); animation: breathe 1.8s ease-in-out infinite; }

    /* KYC pills */
    .kpill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid; }
    .kpill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .kpill.green { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
    .kpill.green .kpill-dot { background: var(--green); }
    .kpill.amber { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
    .kpill.amber .kpill-dot { background: var(--amber); }
    .kpill.red { background: var(--red-bg); border-color: var(--red-bd); color: var(--red); }
    .kpill.red .kpill-dot { background: var(--red); }
    .kpill.muted { background: var(--surface2); border-color: var(--border); color: var(--text3); }
    .kpill.muted .kpill-dot { background: var(--text3); }

    .expand-btn {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .13s; color: var(--text3); flex-shrink: 0;
    }
    .expand-btn svg { width: 13px; height: 13px; fill: currentColor; transition: transform .22s; }
    .expand-btn:hover { background: var(--surface2); color: var(--text2); }
    .expand-btn.open { background: var(--accent-soft); border-color: rgba(108,71,255,.2); color: var(--accent); }
    .expand-btn.open svg { transform: rotate(180deg); }

    /* ── DETAIL PANEL ── */
    .detail-panel { display: none; padding: 0 16px 20px; }
    .detail-panel.open { display: block; animation: fadeSlide .2s ease; }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

    .detail-inner {
      border-top: 1px solid var(--border2);
      padding-top: 16px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 14px;
    }

    /* ── INFO CARDS ── */
    .info-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }
    .info-card:last-child { margin-bottom: 0; }

    .info-card-hd {
      padding: 11px 14px 0;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2px;
    }
    .info-card-title {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .065em; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }
    .info-card-title svg { width: 11px; height: 11px; fill: currentColor; }

    .info-card-btn {
      width: 22px; height: 22px; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text3); transition: all .12s;
    }
    .info-card-btn svg { width: 11px; height: 11px; fill: currentColor; }
    .info-card-btn:hover { background: var(--surface2); color: var(--text2); }

    .info-rows { padding: 6px 0 2px; }
    .info-row {
      display: flex; align-items: flex-start;
      padding: 7px 14px; gap: 10px;
      border-bottom: 1px solid var(--border2);
    }
    .info-row:last-child { border-bottom: none; }
    .info-lbl { font-size: 11px; color: var(--text3); width: 88px; flex-shrink: 0; padding-top: 1px; }
    .info-val { font-size: 12px; color: var(--text2); flex: 1; word-break: break-word; }
    .info-val.mono { font-family: var(--mono); font-size: 10.5px; color: var(--text); }
    .info-val.empty { color: var(--text3); }

    /* ── TABS CARD ── */
    .tabs-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column;
    }

    .tabs-hd {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 2px; gap: 1px;
      background: var(--bg2);
    }
    .tab-btn {
      height: 40px; padding: 0 13px;
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3); font-family: var(--font);
      font-size: 12px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: color .13s; white-space: nowrap; margin-bottom: -1px;
    }
    .tab-btn svg { width: 12px; height: 12px; fill: currentColor; }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-btn:disabled { opacity: .4; cursor: not-allowed; }

    .tabs-status { margin-left: auto; padding-right: 12px; }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text3); opacity: .3;
    }
    .pulse-dot.green { background: var(--green); opacity:1; box-shadow: 0 0 0 3px var(--green-bg); animation: breathe 1.8s ease-in-out infinite; }
    .pulse-dot.amber { background: var(--amber); opacity:1; box-shadow: 0 0 0 3px var(--amber-bg); animation: breathe 1.8s ease-in-out infinite; }
    .pulse-dot.red   { background: var(--red);   opacity:1; box-shadow: 0 0 0 3px var(--red-bg); }

    /* sub-tabs */
    .sub-tabs {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 12px; border-bottom: 1px solid var(--border2);
      background: var(--surface2);
    }
    .sub-tab {
      height: 25px; padding: 0 10px; border-radius: 5px;
      border: 1px solid transparent; background: transparent;
      color: var(--text3); font-family: var(--font);
      font-size: 11.5px; font-weight: 500; cursor: pointer; transition: all .12s;
    }
    .sub-tab:hover { background: var(--bg2); color: var(--text2); border-color: var(--border); }
    .sub-tab.active { background: var(--bg2); border-color: var(--border); color: var(--text); box-shadow: var(--shadow-sm); }
    .sub-tab:disabled { opacity: .35; cursor: not-allowed; }

    /* tab content */
    .tab-content { padding: 14px; flex: 1; overflow-y: auto; max-height: 400px; }

    /* ── TIMELINE ── */
    .timeline { display: flex; flex-direction: column; }
    .tl-item { display: flex; gap: 12px; padding-bottom: 18px; position: relative; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item:not(:last-child)::before {
      content:''; position: absolute; left: 14px; top: 30px;
      width: 1px; height: calc(100% - 14px); background: var(--border);
    }

    .tl-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; z-index: 1; color: var(--text3);
    }
    .tl-icon svg { width: 13px; height: 13px; fill: currentColor; }
    .tl-icon.accent { background: var(--accent-soft); border-color: rgba(108,71,255,.2); color: var(--accent); }
    .tl-icon.green  { background: var(--green-bg);    border-color: var(--green-bd);    color: var(--green); }

    .tl-body { flex: 1; padding-top: 3px; }
    .tl-title { font-size: 12.5px; color: var(--text2); line-height: 1.45; margin-bottom: 3px; }
    .tl-title strong { color: var(--text); font-weight: 500; }
    .tl-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }

    .tl-toggle {
      font-size: 11px; color: var(--accent); cursor: pointer;
      background: none; border: none; font-family: var(--font);
      font-weight: 500; padding: 0; display: inline-flex; align-items: center; gap: 3px;
      margin-bottom: 6px;
    }
    .tl-details {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 11px;
      font-size: 11.5px; color: var(--text2); line-height: 1.55;
      margin-bottom: 5px;
    }

    /* ── HOLDINGS ── */
    .holdings-section { margin-bottom: 14px; }
    .holdings-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text3); margin-bottom: 7px;
      display: flex; align-items: center; gap: 6px;
    }
    .holdings-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    .holding-card {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 13px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg2);
      margin-bottom: 6px; transition: border-color .13s, box-shadow .13s;
    }
    .holding-card:hover { border-color: rgba(108,71,255,.25); box-shadow: 0 2px 10px rgba(108,71,255,.07); }

    .holding-icon {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .holding-info { flex: 1; min-width: 0; }
    .holding-name { font-size: 12.5px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
    .holding-desc { font-size: 11px; color: var(--text3); }
    .holding-right { text-align: right; flex-shrink: 0; }
    .holding-price { font-size: 12.5px; font-weight: 600; font-family: var(--mono); color: var(--text); }
    .holding-change { font-size: 10.5px; color: var(--green); font-weight: 500; }

    /* ── DATA TABLE ── */
    .table-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; overflow-x: auto; margin-top: 6px; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 420px; }
    .data-table th, .data-table td { padding: 7px 11px; text-align: left; font-size: 11px; white-space: nowrap; }
    .data-table th { background: var(--surface2); color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
    .data-table td { color: var(--text2); border-bottom: 1px solid var(--border2); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafafa; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 36px 20px; text-align: center; gap: 8px; color: var(--text3);
    }
    .empty-state svg { width: 28px; height: 28px; fill: currentColor; opacity: .35; }
    .empty-state strong { font-size: 12.5px; color: var(--text2); font-weight: 500; }
    .empty-state p { font-size: 11.5px; max-width: 260px; line-height: 1.5; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,15,20,.4);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      width: 100%; max-width: 380px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
      box-shadow: var(--shadow-lg);
      animation: modalIn .18s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }

    .modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-size: 14.5px; font-weight: 600; }
    .modal-close {
      width: 26px; height: 26px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .modal-close:hover { background: var(--surface3); }

    .modal-field { margin-bottom: 12px; }
    .modal-label { font-size: 11.5px; color: var(--text2); font-weight: 500; margin-bottom: 5px; display: block; }
    .modal-input {
      width: 100%; height: 36px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 0 10px;
      font-family: var(--font); font-size: 13px; color: var(--text);
      outline: none; transition: border-color .13s, box-shadow .13s;
    }
    .modal-input:focus { background: #fff; border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-ring); }

    .modal-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 18px; }
    .mbtn {
      height: 34px; padding: 0 14px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text2); font-family: var(--font);
      font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all .12s;
    }
    .mbtn:hover { background: var(--surface2); color: var(--text); }
    .mbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .mbtn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

    .img-list { display: flex; flex-direction: column; gap: 5px; max-height: 280px; overflow-y: auto; }
    .img-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      cursor: pointer; transition: border-color .12s;
    }
    .img-item:hover { border-color: rgba(108,71,255,.3); background: #fafaff; }
    .img-item-icon {
      width: 30px; height: 30px; border-radius: 6px;
      background: var(--accent-soft); display: flex; align-items: center;
      justify-content: center; color: var(--accent); flex-shrink: 0;
    }
    .img-item-icon svg { width: 13px; height: 13px; fill: currentColor; }
    .img-item-meta { flex: 1; min-width: 0; }
    .img-item-meta strong { font-size: 12px; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .img-item-meta small { font-size: 10.5px; color: var(--text3); }
    .dl-btn {
      height: 26px; padding: 0 9px; border-radius: 5px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); font-family: var(--font);
      font-size: 11px; font-weight: 500; cursor: pointer; flex-shrink: 0;
      transition: all .12s;
    }
    .dl-btn:hover { background: var(--surface3); color: var(--text); }

    @media (max-width: 860px) {
      .detail-inner { grid-template-columns: 1fr; }
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE
let allProfiles = [], allKycMap = {};
const onboardingMap={}, packDetailsRowMap={}, packJsonMap={};
const allocationsByUser={}, holdingsByUser={}, securitiesById={};
const activeFilters = { kyc:'all', bank:'all' };
let activePhoneItem = null;

// ── UTILS
const $  = id => document.getElementById(id);
const esc = v => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getInitials = n => n.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')||'NA';
const fmtNum = (v,d=2) => { const n=Number(v); return isNaN(n)?'-':n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); };
const fmtRel = v => { if(!v)return'-'; const d=new Date(v),ms=Date.now()-d.getTime(),m=6e4,h=36e5,dy=864e5; if(ms<m)return'Just now'; if(ms<h)return`${Math.floor(ms/m)}m ago`; if(ms<dy)return`${Math.floor(ms/h)}h ago`; if(ms<dy*7)return`${Math.floor(ms/dy)}d ago`; return d.toLocaleDateString(); };
const toTs = v => { if(!v)return 0; const p=new Date(v).getTime(); return isFinite(p)?p:0; };
const pickVal = (o,pp) => { for(const p of pp){const pts=p.split('.'); let c=o; for(const k of pts){if(c==null){c=undefined;break;}c=c[k];} if(c!==undefined&&c!==null&&c!=='')return c;} return null; };
const normKyc = v => String(v||'').trim().toLowerCase();
const isCompleted = v => { const n=normKyc(v); return n.includes('completed')||n.includes('approved')||n.includes('verified'); };
const isPending   = v => { const n=normKyc(v); return n.includes('pending')||n.includes('review')||n.includes('processing'); };
const isRejected  = v => { const n=normKyc(v); return n.includes('reject'); };
const hashCode    = s => s.split('').reduce((a,c)=>a+c.charCodeAt(0),0);

// ── SIGN-IN TODAY
const isSameLocalDay = (a,b) => a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const getSignInTs = p => { for(const k of['last_sign_in_at','last_login_at','last_login','last_signed_in_at','signed_in_at','signin_at','last_seen_at']){const v=toTs(p?.[k]);if(v>0)return v;} return 0; };
const isSignedInToday = p => { const t=getSignInTs(p); return t>0&&isSameLocalDay(new Date(t),new Date()); };
const sortProfiles = ps => { const now=new Date(),a=[],b=[]; ps.forEach(p=>{const t=getSignInTs(p);(t>0&&isSameLocalDay(new Date(t),now)?a:b).push(p);}); a.sort((x,y)=>getSignInTs(y)-getSignInTs(x)); b.sort((x,y)=>toTs(y.created_at)-toTs(x.created_at)); return [...a,...b]; };

// ── BANK FILTER
const isTruthyBank = v => { if(v===true)return true; if(typeof v==='number')return v>0; if(typeof v!=='string')return false; const n=normKyc(v); return['true','yes','1','linked','connected','initiated','completed','active','verified','success'].includes(n); };
const getBankInit = p => { const ob=onboardingMap[p?.id]||{}; for(const k of['bank_initiated','bankInitiated','is_bank_initiated','bank_linked','bankLinked','is_bank_linked','bank_connected','bankConnected','bank_status','bankStatus','banking_status','bank_account_status','bank_account_linked','bank_started']){if(ob[k]!==undefined)return isTruthyBank(ob[k]);if(p?.[k]!==undefined)return isTruthyBank(p[k]);} for(const[k,v]of Object.entries(ob)){if(String(k).toLowerCase().includes('bank')&&isTruthyBank(v))return true;} for(const[k,v]of Object.entries(p||{})){if(String(k).toLowerCase().includes('bank')&&isTruthyBank(v))return true;} return false; };

const AVATAR_COLORS = ['#6c47ff','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#ef4444'];
const avatarColor  = name => AVATAR_COLORS[(name.charCodeAt(0)||0) % AVATAR_COLORS.length];

const getKycState = (profileId, rawStatus) => {
  const pack = packJsonMap[profileId]||null;
  let fp = null;
  if(pack){ const ra=String(pickVal(pack,['review.result.reviewAnswer','review.reviewAnswer','reviewAnswer'])||'').toUpperCase(); if(ra==='GREEN')fp='completed'; else if(ra==='RED')fp='rejected'; else if(ra==='YELLOW'||ra==='ORANGE')fp='pending'; }
  const rejected  = fp==='rejected'  || isRejected(rawStatus);
  const completed = !rejected && (fp==='completed' || isCompleted(rawStatus));
  const pending   = !rejected && !completed && (fp==='pending' || isPending(rawStatus));
  const label = rejected?'Rejected':completed?'Completed':pending?'Pending':(rawStatus||'Not initiated');
  return { rejected, completed, pending, label };
};

const kycPillHtml = s => {
  if(s.completed) return `<span class="kpill green"><span class="kpill-dot"></span>Completed</span>`;
  if(s.rejected)  return `<span class="kpill red"><span class="kpill-dot"></span>Rejected</span>`;
  if(s.pending)   return `<span class="kpill amber"><span class="kpill-dot"></span>Pending</span>`;
  return `<span class="kpill muted"><span class="kpill-dot"></span>${esc(s.label)}</span>`;
};
const pulseCls = s => s.completed?'green':s.rejected?'red':s.pending?'amber':'';

// ── HISTORY
const buildAllocsTable = rows => {
  const body = rows.map(r=>`<tr><td>${esc(r.asset_class||'-')}</td><td>${fmtNum(r.weight,2)}%</td><td>R ${fmtNum(r.value,2)}</td><td>${esc(r.as_of_date||'-')}</td></tr>`).join('');
  return `<div class="table-wrap"><table class="data-table"><thead><tr><th>Asset class</th><th>Weight</th><th>Value</th><th>As of</th></tr></thead><tbody>${body}</tbody></table></div>`;
};
const buildHoldingsTable = rows => {
  const body = rows.map(r=>{const sec=securitiesById[r.security_id]||{};const lbl=sec.symbol||sec.name||r.security_id||'-';return`<tr><td>${esc(lbl)}</td><td>${fmtNum(r.quantity,2)}</td><td>R ${fmtNum(r.avg_fill,2)}</td><td>R ${fmtNum(r.market_value,2)}</td><td>${esc(r.status||r.Status||'-')}</td></tr>`}).join('');
  return `<div class="table-wrap"><table class="data-table"><thead><tr><th>Security</th><th>Qty</th><th>Avg fill</th><th>Mkt value</th><th>Status</th></tr></thead><tbody>${body}</tbody></table></div>`;
};

const buildHistoryHtml = profile => {
  const events = [];
  if(profile.created_at) events.push({at:profile.created_at,icon:'accent',title:`<strong>Profile created</strong>`,meta:'System',details:`UID: ${esc(profile.id)}`});
  const ke=allKycMap[profile.id]||{};
  if(ke.status){const st=getKycState(profile.id,ke.status);events.push({at:onboardingMap[profile.id]?.updated_at||profile.created_at,icon:st.completed?'green':'',title:`KYC updated to <strong>${esc(st.label)}</strong>`,meta:'KYC workflow'});}
  const allocs=allocationsByUser[profile.id]||[];
  if(allocs.length) events.push({at:allocs[0].updated_at||profile.created_at,icon:'accent',title:`<strong>${allocs.length} allocation${allocs.length!==1?'s':''}</strong> on record`,meta:'allocations table',table:buildAllocsTable(allocs)});
  const hlds=holdingsByUser[profile.id]||[];
  const buys=hlds.filter(r=>Number(r.quantity)>0);
  if(buys.length) events.push({at:buys[0].updated_at||profile.created_at,icon:'green',title:`<strong>${buys.length} stock holding${buys.length!==1?'s':''}</strong>`,meta:'stock_holdings',table:buildHoldingsTable(buys)});
  events.sort((a,b)=>toTs(b.at)-toTs(a.at));
  if(!events.length) return `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><strong>No history yet</strong><p>Activity will appear here once data is available.</p></div>`;
  return `<div class="timeline">${events.map(ev=>`
    <div class="tl-item">
      <div class="tl-icon ${ev.icon||''}"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14l-4-4 1.41-1.41L11 13.17l4.59-4.58L17 10l-6 6z"/></svg></div>
      <div class="tl-body">
        <div class="tl-title">${ev.title}</div>
        ${ev.details?`<button class="tl-toggle" onclick="var d=this.nextElementSibling;d.style.display=d.style.display==='none'?'block':'none';this.textContent=d.style.display==='none'?'▸ Show data':'▾ Hide data'">▸ Show data</button><div class="tl-details" style="display:none;">${ev.details}</div>`:''}
        ${ev.table?`<div class="tl-details">${ev.table}</div>`:''}
        <div class="tl-meta">${esc(ev.meta||'')} · ${fmtRel(ev.at)}</div>
      </div>
    </div>`).join('')}</div>`;
};

// ── HOLDINGS VIEW
const buildHoldingsHtml = profileId => {
  const allocs=allocationsByUser[profileId]||[];
  const stocks=holdingsByUser[profileId]||[];
  if(!allocs.length&&!stocks.length) return `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M10 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V9l-6-6h-5zm0 2h4.17L19 9.83V19H5V5h5z"/></svg><strong>No holdings</strong><p>Holdings will appear once allocation data is available.</p></div>`;
  const allocCards=allocs.map(r=>{const c=AVATAR_COLORS[Math.abs(hashCode(r.asset_class||''))%AVATAR_COLORS.length];return`<div class="holding-card"><div class="holding-icon" style="background:${c}">${(r.asset_class||'?')[0].toUpperCase()}</div><div class="holding-info"><div class="holding-name">${esc(r.asset_class||'Allocation')}</div><div class="holding-desc">Weight ${fmtNum(r.weight,2)}% · ${esc(r.as_of_date||'-')}</div></div><div class="holding-right"><div class="holding-price">R ${fmtNum(r.value,2)}</div>${r.return_1d!=null?`<div class="holding-change">${Number(r.return_1d)>=0?'+':''}${fmtNum(r.return_1d,3)}%</div>`:''}</div></div>`;}).join('');
  const stockCards=stocks.filter(r=>Number(r.quantity)>0).map(r=>{const sec=securitiesById[r.security_id]||{};const name=sec.name||sec.symbol||r.security_id||'Stock';const c=AVATAR_COLORS[Math.abs(hashCode(name))%AVATAR_COLORS.length];return`<div class="holding-card"><div class="holding-icon" style="background:${c}">${name[0].toUpperCase()}</div><div class="holding-info"><div class="holding-name">${esc(name)}</div><div class="holding-desc">Qty ${fmtNum(r.quantity,2)} · ${esc(r.as_of_date||'-')}</div></div><div class="holding-right"><div class="holding-price">R ${fmtNum(r.market_value,2)}</div>${r.unrealized_pnl!=null?`<div class="holding-change">${Number(r.unrealized_pnl)>=0?'+':''}R ${fmtNum(r.unrealized_pnl,2)}</div>`:''}</div></div>`;}).join('');
  return `${allocs.length?`<div class="holdings-section"><div class="holdings-section-title">Strategy</div>${allocCards}</div>`:''}${stockCards?`<div class="holdings-section"><div class="holdings-section-title">Individual stocks</div>${stockCards}</div>`:''}`;
};

// ── BUILD PROFILE ITEM
const buildProfileItem = profile => {
  const fullName=[profile.first_name,profile.last_name].filter(Boolean).join(' ')||'Unknown User';
  const initials=getInitials(fullName);
  const color=avatarColor(fullName);
  const ke=allKycMap[profile.id]||{};
  const kycState=getKycState(profile.id,ke.status||'Not initiated');
  const pc=pulseCls(kycState);
  const signedIn=isSignedInToday(profile);

  const item=document.createElement('div');
  item.className='profile-item';
  item.dataset.profileId=profile.id;
  if(ke.externalUserId) item.dataset.externalUserId=ke.externalUserId;

  item.innerHTML=`
    <div class="profile-row">
      <div class="profile-avatar ${signedIn?'signed-in':''}" style="background:${color}">${esc(initials)}</div>
      <div class="profile-info">
        <div class="profile-name">${esc(fullName)}</div>
        <div class="profile-uid">${esc(String(profile.id||'').slice(0,28))}</div>
      </div>
      <div class="profile-meta">
        ${signedIn?'<span class="signed-badge">Active today</span>':''}
        ${kycPillHtml(kycState)}
        <button class="expand-btn" aria-label="Expand" aria-expanded="false">
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
      </div>
    </div>

    <div class="detail-panel">
      <div class="detail-inner">
        <!-- LEFT -->
        <div>
          <div class="info-card">
            <div class="info-card-hd">
              <div class="info-card-title">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Profile
              </div>
            </div>
            <div class="info-rows">
              <div class="info-row"><div class="info-lbl">Name</div><div class="info-val">${esc(fullName)}</div></div>
              <div class="info-row"><div class="info-lbl">UID</div><div class="info-val mono">${esc(profile.id||'\u2014')}</div></div>
              <div class="info-row"><div class="info-lbl">Email</div><div class="info-val ${!profile.email?'empty':''}">${esc(profile.email||'Not added')}</div></div>
              <div class="info-row"><div class="info-lbl">Phone</div><div class="info-val ${!profile.phone_number?'empty':''}" data-phone-val>${esc(profile.phone_number||'Not added')}</div></div>
              <div class="info-row"><div class="info-lbl">Address</div><div class="info-val ${!profile.address?'empty':''}">${esc(profile.address||'Not added')}</div></div>
              <div class="info-row"><div class="info-lbl">Created</div><div class="info-val">${esc(fmtRel(profile.created_at))}</div></div>
            </div>
          </div>
          <div class="info-card">
            <div class="info-card-hd">
              <div class="info-card-title">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                Contact
              </div>
              <button class="info-card-btn phone-add-btn" aria-label="Add phone">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              </button>
            </div>
            <div class="info-rows">
              <div class="info-row"><div class="info-lbl">KYC</div><div class="info-val">${kycPillHtml(kycState)}</div></div>
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="tabs-card">
          <div class="tabs-hd">
            <button class="tab-btn" data-tab="pack">
              <svg viewBox="0 0 24 24"><path d="M12 3c.55 0 1 .45 1 1v8.17l2.59-2.58 1.41 1.41L12 17l-5-5 1.41-1.41L11 12.17V4c0-.55.45-1 1-1zm-7 14h14v2H5v-2z"/></svg>
              Pack
            </button>
            <button class="tab-btn" data-tab="docs">
              <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm1 7V3.5L18.5 9H15z"/></svg>
              Documents
            </button>
            <div class="tabs-status">
              <div class="pulse-dot ${pc}" data-pulse-dot></div>
            </div>
          </div>

          <div class="sub-tabs">
            <button class="sub-tab active" data-sub="history">History</button>
            <button class="sub-tab" data-sub="holdings">Holdings</button>
            <button class="sub-tab" data-sub="client-details" disabled>Client details</button>
          </div>

          <div class="tab-content">
            <div data-view="history">${buildHistoryHtml(profile)}</div>
            <div data-view="holdings" style="display:none">${buildHoldingsHtml(profile.id)}</div>
            <div data-view="client-details" style="display:none">
              <div class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M12 3c.55 0 1 .45 1 1v8.17l2.59-2.58 1.41 1.41L12 17l-5-5 1.41-1.41L11 12.17V4c0-.55.45-1 1-1zm-7 14h14v2H5v-2z"/></svg>
                <strong>No client details</strong>
                <p>Click Pack to fetch client details from Sumsub.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // expand
  const btn=item.querySelector('.expand-btn');
  const panel=item.querySelector('.detail-panel');
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    const open=panel.classList.toggle('open');
    btn.classList.toggle('open',open);
    btn.setAttribute('aria-expanded',String(open));
    if(open) tryRefreshPack(item).catch(console.warn);
  });

  // sub-tabs
  item.querySelectorAll('.sub-tab').forEach(t=>{
    t.addEventListener('click',()=>{
      if(t.disabled)return;
      item.querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      item.querySelectorAll('[data-view]').forEach(v=>v.style.display=v.dataset.view===t.dataset.sub?'block':'none');
    });
  });

  // tab actions
  item.querySelectorAll('.tab-btn').forEach(t=>{
    t.addEventListener('click',async()=>{
      if(t.dataset.tab==='pack'){
        const orig=t.innerHTML; t.textContent='Downloading\u2026'; t.disabled=true;
        try{ await refreshAndDownloadPackZip(item); }catch(e){console.error(e);}
        t.innerHTML=orig; t.disabled=false;
      }
      if(t.dataset.tab==='docs'){
        const extId=item.dataset.externalUserId; if(!extId)return;
        try{
          const app=await fetchApplicantByExternalId(extId);
          const meta=await fetchApplicantMetadata(app.id);
          const inspId=app?.inspectionId||app?.review?.inspectionId;
          const items=Array.isArray(meta)?meta:(meta?.resources||meta?.items||[meta]);
          openImageModal(inspId,items);
        }catch(e){console.error(e);}
      }
    });
  });

  item.querySelector('.phone-add-btn')?.addEventListener('click',()=>{
    activePhoneItem=item; $('phoneInput').value=''; $('phoneModal').classList.add('open');
  });

  return item;
};

// ── RENDER
const renderProfiles = profiles => {
  const list=$('profilesList');
  list.innerHTML='';
  $('userCount').textContent=profiles.length;
  $('userLabel').textContent=profiles.length===1?'user':'users';
  if(!profiles.length){list.innerHTML=`<div style="padding:36px;text-align:center;color:var(--text3);font-size:13px;">No profiles match your filters.</div>`;return;}
  profiles.forEach(p=>list.appendChild(buildProfileItem(p)));
};

const applyFilter = () => {
  const q=($('searchInput').value||'').trim().toLowerCase();
  const filtered=allProfiles.filter(p=>{
    const name=[p.first_name,p.last_name].filter(Boolean).join(' ').toLowerCase();
    const uid=String(p.id||'').toLowerCase();
    if(q&&!name.includes(q)&&!uid.includes(q))return false;
    const s=getKycState(p.id,allKycMap[p.id]?.status||'');
    if(activeFilters.kyc==='completed'&&!s.completed)return false;
    if(activeFilters.kyc==='pending'&&!s.pending)return false;
    if(activeFilters.kyc==='rejected'&&!s.rejected)return false;
    if(activeFilters.kyc==='not-completed'&&s.completed)return false;
    if(activeFilters.bank!=='all'){const bi=getBankInit(p);if(activeFilters.bank==='linked'&&!bi)return false;if(activeFilters.bank==='unlinked'&&bi)return false;}
    return true;
  });
  renderProfiles(filtered);
};

// ── LOAD
const load = async () => {
  const {data:profiles,error}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  const ids=(profiles||[]).map(p=>p.id).filter(Boolean);
  allProfiles=sortProfiles(profiles||[]);

  if(ids.length){
    const [{data:ob},{data:pk},{data:al},{data:hd}]=await Promise.all([
      sb.from('user_onboarding').select('*').in('user_id',ids),
      sb.from('user_onboarding_pack_details').select('*').in('user_id',ids),
      sb.from('allocations').select('*').in('user_id',ids).order('updated_at',{ascending:false}),
      sb.from('stock_holdings').select('user_id,security_id,quantity,avg_fill,market_value,unrealized_pnl,status:"Status",fill_date:"Fill_date",as_of_date,created_at,updated_at').in('user_id',ids).order('updated_at',{ascending:false})
    ]);
    (ob||[]).forEach(r=>{allKycMap[r.user_id]={status:r.kyc_status||'',externalUserId:r.user_id};onboardingMap[r.user_id]=r;});
    (pk||[]).forEach(r=>{packDetailsRowMap[r.user_id]=r;if(r.pack_details)packJsonMap[r.user_id]=r.pack_details;});
    (al||[]).forEach(r=>{if(!allocationsByUser[r.user_id])allocationsByUser[r.user_id]=[];allocationsByUser[r.user_id].push(r);});
    (hd||[]).forEach(r=>{if(!holdingsByUser[r.user_id])holdingsByUser[r.user_id]=[];holdingsByUser[r.user_id].push(r);});
    const sids=[...new Set([...(hd||[]).map(r=>r.security_id),...(al||[]).map(r=>r.security_id)].filter(Boolean))];
    if(sids.length){const{data:secs}=await sb.from('securities').select('id,symbol,name,logo_url').in('id',sids);(secs||[]).forEach(s=>securitiesById[s.id]=s);}
  }
  applyFilter();
};

// ── SUMSUB
const tryRefreshPack = async item => {
  const extId=item.dataset.externalUserId; if(!extId)return;
  const app=await fetchApplicantByExternalId(extId);
  if(!app)return;
  const pid=item.dataset.profileId;
  packJsonMap[pid]=app;
  const cdb=item.querySelector('[data-sub="client-details"]'); if(cdb) cdb.disabled=false;
  await sb.from('user_onboarding_pack_details').upsert({user_id:pid,pack_details:app},{onConflict:'user_id'});
};

const fetchApplicantByExternalId = async extId => { const r=await fetch(`/api/sumsub/applicant?externalUserId=${encodeURIComponent(extId)}`); if(!r.ok)throw new Error(r.status); return r.json(); };
const fetchApplicantMetadata = async appId => { const r=await fetch(`/api/sumsub/metadata?applicantId=${encodeURIComponent(appId)}`); if(!r.ok)throw new Error(r.status); return r.json(); };
const fetchApplicantImage = async (inspId,imgId) => { const r=await fetch(`/api/sumsub/image?inspectionId=${encodeURIComponent(inspId)}&imageId=${encodeURIComponent(imgId)}`); if(!r.ok)throw new Error(r.status); return r.blob(); };

const refreshAndDownloadPackZip = async item => {
  const extId=item.dataset.externalUserId; if(!extId)return;
  const JSZip=window.JSZip;
  const app=await fetchApplicantByExternalId(extId);
  const pid=item.dataset.profileId; packJsonMap[pid]=app;
  await sb.from('user_onboarding_pack_details').upsert({user_id:pid,pack_details:app},{onConflict:'user_id'});
  const appId=app?.id; if(!appId)return;
  const meta=await fetchApplicantMetadata(appId);
  const inspId=app?.inspectionId||app?.review?.inspectionId;
  const items=Array.isArray(meta)?meta:(meta?.resources||meta?.items||[meta]);
  const base=String(extId||appId).replace(/[^a-z0-9_-]/gi,'_')||'pack';
  const zip=new JSZip(); zip.file(`sumsub-${base}.json`,JSON.stringify(app,null,2));
  if(inspId&&items.length){
    const folder=zip.folder('documents');
    await Promise.all(items.map(async(d,i)=>{const id=d?.id||d?.imageId||d?.resourceId;if(!id)return;try{const b=await fetchApplicantImage(inspId,id);folder.file(d?.fileMetadata?.fileName||`doc-${i+1}`,b);}catch(e){};}));
  }
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`pack-${base}.zip`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
};

// ── IMAGE MODAL
const openImageModal = (inspId,items) => {
  const list=$('imageList'); list.innerHTML='';
  (items||[]).forEach((img,i)=>{
    const imgId=img?.id||img?.previewId||img?.imageId||img?.resourceId; if(!imgId)return;
    const name=img?.fileMetadata?.fileName||`Document ${i+1}`;
    const type=img?.fileMetadata?.fileType||'File';
    const el=document.createElement('div'); el.className='img-item';
    el.innerHTML=`<div class="img-item-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm1 7V3.5L18.5 9H15z"/></svg></div><div class="img-item-meta"><strong title="${esc(name)}">${esc(name)}</strong><small>${esc(type)}</small></div><button class="dl-btn">Download</button>`;
    el.querySelector('.dl-btn').addEventListener('click',async e=>{e.stopPropagation();const b=await fetchApplicantImage(inspId,imgId);const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);});
    el.addEventListener('click',async()=>{const b=await fetchApplicantImage(inspId,imgId);window.open(URL.createObjectURL(b),'_blank','noopener');});
    list.appendChild(el);
  });
  $('imageModal').classList.add('open');
};

// ── EVENTS
$('searchInput').addEventListener('input',applyFilter);

document.querySelectorAll('[data-kyc-pill]').forEach(b=>{
  b.addEventListener('click',()=>{
    activeFilters.kyc=b.dataset.kycPill;
    document.querySelectorAll('[data-kyc-pill]').forEach(x=>x.classList.toggle('active',x===b));
    applyFilter();
  });
});

const bankBtn=$('bankFilterBtn'),bankMenu=$('bankMenu');
bankBtn.addEventListener('click',()=>bankMenu.classList.toggle('open'));
document.querySelectorAll('[data-bank-filter]').forEach(b=>{
  b.addEventListener('click',()=>{activeFilters.bank=b.dataset.bankFilter;document.querySelectorAll('[data-bank-filter]').forEach(x=>x.classList.toggle('active',x===b));bankMenu.classList.remove('open');applyFilter();});
});
document.addEventListener('click',e=>{if(!bankMenu.contains(e.target)&&!bankBtn.contains(e.target))bankMenu.classList.remove('open');});

$('phoneModalClose').addEventListener('click',()=>$('phoneModal').classList.remove('open'));
$('phoneModalCancel').addEventListener('click',()=>$('phoneModal').classList.remove('open'));
$('phoneModal').addEventListener('click',e=>{if(e.target===$('phoneModal'))$('phoneModal').classList.remove('open');});
$('phoneModalSave').addEventListener('click',async()=>{
  if(!activePhoneItem)return;
  const val=$('phoneInput').value.trim(); if(!val)return;
  const pid=activePhoneItem.dataset.profileId;
  await sb.from('profiles').update({phone_number:val}).eq('id',pid);
  const el=activePhoneItem.querySelector('[data-phone-val]');
  if(el){el.textContent=val;el.classList.remove('empty');}
  $('phoneModal').classList.remove('open');
});
$('imageModalClose').addEventListener('click',()=>$('imageModal').classList.remove('open'));
$('imageModal').addEventListener('click',e=>{if(e.target===$('imageModal'))$('imageModal').classList.remove('open');});
$('signOutBtn').addEventListener('click',async()=>{await sb.auth.signOut();window.location.href='/signin.html';});

// ── BOOT
(async()=>{
  const{data}=await sb.auth.getSession();
  if(!data.session){window.location.href='/signin.html';return;}
  await load();
})();
</script>
</body>
</html>
