<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint CRM — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;min-height:100vh;color:#111827;background:#f8f9fb;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
    .card{width:100%;max-width:440px;background:#fff;border-radius:24px;padding:36px;box-shadow:0 24px 60px rgba(15,23,42,.12);}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
    .brand img{width:36px;height:36px;border-radius:10px;}
    .brand-name{font-size:13px;font-weight:600;color:#6b7280;}
    h1{font-size:26px;font-weight:600;color:#111827;margin-bottom:6px;}
    .sub{font-size:14px;color:#6b7280;margin-bottom:24px;}
    .group{margin-bottom:16px;}
    label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
    input{width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;color:#111827;outline:none;transition:border-color .15s;font-family:inherit;}
    input:focus{border-color:#7c3aed;}
    input:disabled{background:#f3f4f6;color:#6b7280;}
    .btn{width:100%;padding:12px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#0f172a;color:#fff;transition:opacity .15s;font-family:inherit;}
    .btn:hover{opacity:.9;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .err{background:#fee2e2;color:#991b1b;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none;}
    .ok{background:#dcfce7;color:#14532d;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none;}
    .center{text-align:center;font-size:13px;color:#6b7280;margin-top:18px;}
    .center a{color:#111827;font-weight:600;text-decoration:none;}
    .loading{text-align:center;padding:36px 16px;color:#6b7280;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <img src="/icon.png" alt="Mint">
        <div class="brand-name">Mint CRM</div>
      </div>

      <div id="loadingState" class="loading">Verifying your invitation…</div>

      <div id="errorState" style="display:none">
        <h1>Invitation problem</h1>
        <p class="sub" id="errorMessage">This invitation link is no longer valid.</p>
        <a href="/signin.html" class="btn" style="display:inline-block;text-decoration:none;text-align:center;">Back to sign in</a>
      </div>

      <div id="formState" style="display:none">
        <h1>Create your account</h1>
        <p class="sub">Set a password to finish joining the Mint Admin Portal.</p>
        <div class="err" id="errBox"></div>
        <div class="ok" id="okBox"></div>

        <form id="signupForm">
          <div class="group">
            <label>Email</label>
            <input id="email" type="email" disabled>
          </div>
          <div class="group">
            <label>Full name</label>
            <input id="fullName" type="text" placeholder="Your name" required>
          </div>
          <div class="group">
            <label>Password</label>
            <input id="password" type="password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
          </div>
          <div class="group">
            <label>Confirm password</label>
            <input id="confirmPassword" type="password" placeholder="Repeat password" minlength="8" required autocomplete="new-password">
          </div>
          <button class="btn" id="submitBtn" type="submit">Create account</button>
        </form>
        <p class="center">Already have an account? <a href="/signin.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const showError = (msg) => {
      $('loadingState').style.display = 'none';
      $('formState').style.display = 'none';
      $('errorState').style.display = 'block';
      $('errorMessage').textContent = msg || 'This invitation link is no longer valid.';
    };
    const showForm = (user) => {
      $('loadingState').style.display = 'none';
      $('formState').style.display = 'block';
      $('email').value = user.email || '';
      const meta = user.user_metadata || {};
      if (meta.full_name) $('fullName').value = meta.full_name;
    };
    const showInline = (id, msg) => { const el = $(id); el.textContent = msg; el.style.display = 'block'; };
    const hideInline = (id) => { $(id).style.display = 'none'; };

    // Supabase invite links arrive as #access_token=...&type=invite — supabase-js v2 absorbs that
    // on its own (detectSessionInUrl is true by default). Wait for the session, then show the form.
    (async () => {
      let attempts = 0;
      const tryReady = async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data?.session?.user) { showForm(data.session.user); return; }
        const params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        if (params.get('error_description')) {
          showError(decodeURIComponent(params.get('error_description')));
          return;
        }
        if (!params.get('access_token') && attempts > 0) {
          showError('Missing invitation token. Please open the invite link from your email again.');
          return;
        }
        if (++attempts < 12) setTimeout(tryReady, 200);
        else showError('Could not validate the invitation link. Please ask your admin to resend it.');
      };
      tryReady();
    })();

    $('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideInline('errBox'); hideInline('okBox');
      const full_name = $('fullName').value.trim();
      const password = $('password').value;
      const confirmPassword = $('confirmPassword').value;
      if (password.length < 8) return showInline('errBox', 'Password must be at least 8 characters.');
      if (password !== confirmPassword) return showInline('errBox', 'Passwords do not match.');

      const btn = $('submitBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      // 1) Set the password on the Supabase auth user (we already have an authenticated session
      //    from the invite magic link).
      const updateRes = await supabaseClient.auth.updateUser({
        password,
        data: { full_name }
      });
      if (updateRes.error) {
        showInline('errBox', updateRes.error.message || 'Could not set your password.');
        btn.disabled = false; btn.textContent = 'Create account';
        return;
      }

      // 2) Tell our backend to mark the admin_team row active for this user.
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const res = await fetch('/api/team?action=complete-signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session?.access_token || ''}`
          },
          body: JSON.stringify({ full_name })
        });
        const data = await res.json();
        if (!data.ok) {
          showInline('errBox', data.error || 'Could not finalize your account.');
          btn.disabled = false; btn.textContent = 'Create account';
          return;
        }
      } catch {
        showInline('errBox', 'Could not reach the server. Please try signing in directly.');
        btn.disabled = false; btn.textContent = 'Create account';
        return;
      }

      showInline('okBox', 'Account created! Redirecting to sign in…');
      const email = $('email').value;
      await supabaseClient.auth.signOut();
      setTimeout(() => { window.location.href = '/signin.html?reason=signup-success&email=' + encodeURIComponent(email); }, 1100);
    });
  </script>
</body>
</html>
