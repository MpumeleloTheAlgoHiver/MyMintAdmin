<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint CRM — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;min-height:100vh;color:#111827;background:#f8f9fb;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
    .card{width:100%;max-width:440px;background:#fff;border-radius:24px;padding:36px;box-shadow:0 24px 60px rgba(15,23,42,.12);}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
    .brand img{width:36px;height:36px;border-radius:10px;}
    .brand-name{font-size:13px;font-weight:600;color:#6b7280;}
    h1{font-size:26px;font-weight:600;color:#111827;margin-bottom:6px;}
    .sub{font-size:14px;color:#6b7280;margin-bottom:24px;}
    .group{margin-bottom:16px;}
    label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
    input{width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;color:#111827;outline:none;font-family:inherit;}
    input:focus{border-color:#7c3aed;}
    .btn{width:100%;padding:12px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#0f172a;color:#fff;font-family:inherit;}
    .btn:hover{opacity:.9;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .ok{background:#dcfce7;color:#14532d;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none;}
    .err{background:#fee2e2;color:#991b1b;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none;}
    .loading{text-align:center;padding:36px 16px;color:#6b7280;}
    .center{text-align:center;font-size:13px;color:#6b7280;margin-top:18px;}
    .center a{color:#111827;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <img src="/icon.png" alt="Mint">
        <div class="brand-name">Mint CRM</div>
      </div>

      <div id="loadingState" class="loading">Validating reset link…</div>

      <div id="errorState" style="display:none">
        <h1>Reset link problem</h1>
        <p class="sub" id="errorMessage">This reset link is invalid or has expired.</p>
        <a href="/forgot-password.html" class="btn" style="display:inline-block;text-decoration:none;text-align:center;">Request a new link</a>
      </div>

      <div id="formState" style="display:none">
        <h1>Choose a new password</h1>
        <p class="sub">Enter and confirm your new password.</p>
        <div class="ok" id="okBox"></div>
        <div class="err" id="errBox"></div>
        <form id="resetForm">
          <div class="group">
            <label>New password</label>
            <input id="password" type="password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
          </div>
          <div class="group">
            <label>Confirm password</label>
            <input id="confirmPassword" type="password" placeholder="Repeat password" minlength="8" required autocomplete="new-password">
          </div>
          <button class="btn" id="submitBtn" type="submit">Update password</button>
        </form>
        <p class="center"><a href="/signin.html">Back to sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const showError = (msg) => { $('loadingState').style.display='none'; $('errorState').style.display='block'; $('errorMessage').textContent = msg; };
    const showForm = () => { $('loadingState').style.display='none'; $('formState').style.display='block'; };
    const showInline = (id, msg) => { const el=$(id); el.textContent=msg; el.style.display='block'; };
    const hide = (id) => { $(id).style.display='none'; };

    // Supabase recovery links arrive with #access_token=...&type=recovery — supabase-js parses that
    // automatically into a session. We just need to wait for it and then call updateUser.
    (async () => {
      // Allow the SDK to absorb the URL hash
      try { await supabaseClient.auth.getSessionFromUrl?.({ storeSession: true }); } catch {}
      // Modern supabase-js v2: detectSessionInUrl is on by default. Just check session.
      let attempts = 0;
      const tryReady = async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data?.session) { showForm(); return; }
        const params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        if (!params.get('access_token') && !params.get('error')) {
          showError('Missing reset token. Open the link from your email again.');
          return;
        }
        if (params.get('error_description')) {
          showError(decodeURIComponent(params.get('error_description')));
          return;
        }
        if (++attempts < 10) setTimeout(tryReady, 200);
        else showError('Could not validate reset link. Please request a new one.');
      };
      tryReady();
    })();

    $('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('okBox'); hide('errBox');
      const password = $('password').value;
      const confirmPassword = $('confirmPassword').value;
      if (password.length < 8) return showInline('errBox', 'Password must be at least 8 characters.');
      if (password !== confirmPassword) return showInline('errBox', 'Passwords do not match.');

      const btn = $('submitBtn');
      btn.disabled = true; btn.textContent = 'Updating…';
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) {
        showInline('errBox', error.message || 'Could not update password.');
        btn.disabled = false; btn.textContent = 'Update password';
        return;
      }
      showInline('okBox', 'Password updated. Redirecting to sign in…');
      await supabaseClient.auth.signOut();
      setTimeout(() => { window.location.href = '/signin.html?reason=reset-success'; }, 1100);
    });
  </script>
</body>
</html>
